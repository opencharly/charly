# OpenCharly keeps Codex constrained to this repository by default. Charly's
# approved disposable workloads, not an unrestricted host agent, provide the
# full candybox execution surface. Git metadata, normal host caches, network,
# and Charly deploy/R10 commands cross the sandbox through exact approvals.
sandbox_mode = "workspace-write"
approval_policy = "on-request"
approvals_reviewer = "auto_review"

[sandbox_workspace_write]
network_access = false

check-structkind-layer:
    candy:
        version: 2026.182.0440
        description: |
            Drop /etc/check-structkind-marker on the host filesystem.
            The deployable member of the check-structkind foundation bed (F5 authored-member
            input-threading): a kind:local layer whose write: step lands a marker asserted by a
            check authored on the DEPLOY NODE'S plan (a composed candy's plan: never reaches a
            deploy-scope check runner, so a check authored here would never run at deploy scope).
            A DEDICATED marker path (not check-local's) so the two beds never collide when
            /verify-beds fans them out concurrently.
        plan:
            - run: write=/etc/check-structkind-marker
              write: /etc/check-structkind-marker
              run_as: root
              mode: "0644"
              content: |
                check-structkind v1
            - check: the check-structkind marker file is present at /etc/check-structkind-marker
              file:
                file: /etc/check-structkind-marker
                exists: true
            - check: the marker records the check-structkind version stamp "check-structkind v1"
              file:
                file: /etc/check-structkind-marker
                contains:
                    - contains: "check-structkind v1"
            - check: command=test -f /etc/check-structkind-marker
              id: check-structkind-marker-host
              context:
                - runtime
              command:
                command: "test -f /etc/check-structkind-marker"
                in_container: false

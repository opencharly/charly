check-tier1-layer:
    candy:
        version: 2026.144.1443
        description: |
            bench-tier1 — marker file for harness tier1 scenarios
            Writes /etc/charly-bench-marker containing the string "charly benchmark target",
            satisfying the tier1-easy harness recipe.
        plan:
            - run: mkdir=/etc
              mkdir: /etc
              run_as: root
              mode: "0755"
            - run: write=/etc/charly-bench-marker
              write: /etc/charly-bench-marker
              run_as: root
              mode: "0644"
              content: |
                charly benchmark target
            - check: the bench marker file exists at /etc/charly-bench-marker
              file:
                file: /etc/charly-bench-marker
                exists: true
            - check: the marker file is written world-readable at mode 0644
              file:
                file: /etc/charly-bench-marker
                mode: "0644"
            - check: the marker file carries the tier1 benchmark target string
              file:
                file: /etc/charly-bench-marker
                contains:
                    - charly benchmark target

hermes-full:
    candy:
        version: 2026.200.1600
        description: |
            Standalone Hermes AI-agent metalayer composing the AI coding CLIs (claude/codex/gemini/forge) plus the developer and DevOps toolchains into one box
            hermes-full is a pure meta-composition with no install of its own: it
            composes the hermes agent, four AI coding CLIs (claude-code, codex,
            gemini, forgecode), the dev-tools and devops-tools toolchains, and tmux.
            Its observable effect is that every composed candy's key artifact
            coexists in ONE image — the hermes agent binary, each AI CLI on PATH,
            and the developer/DevOps binaries — and the hermes agent comes up as a
            supervised service when the box is deployed. Dropping any candy from the
            candy: list makes the matching check below fail.
        candy:
            - hermes
            - claude-code
            - codex
            - gemini
            - forgecode
            - dev-tools
            - devops-tools
            - tmux
        plan:
            - check: the hermes agent binary is installed in the pixi default env
              file:
                file: ${HOME}/.pixi/envs/default/bin/hermes
                exists: true
            - check: the hermes entrypoint wrapper is installed and executable
              file:
                file: ${HOME}/.local/bin/hermes-entrypoint
                exists: true
                mode: "0755"
            - check: the Claude Code CLI binary is on PATH at the native install location
              file:
                file: /usr/local/bin/claude
                exists: true
            - check: the OpenAI Codex CLI binary is on PATH in the npm global bin dir
              file:
                file: ${HOME}/.npm-global/bin/codex
                exists: true
            - check: the Google Gemini CLI binary is on PATH in the npm global bin dir
              file:
                file: ${HOME}/.npm-global/bin/gemini
                exists: true
            - check: the Forge CLI binary is on PATH in the npm global bin dir
              file:
                file: ${HOME}/.npm-global/bin/forge
                exists: true
            - check: the ripgrep fast-search binary from dev-tools is on PATH
              file:
                file: /usr/bin/rg
                exists: true
            - check: the neovim editor binary from dev-tools is on PATH
              file:
                file: /usr/bin/nvim
                exists: true
            - check: the tmux multiplexer binary is on PATH and reports its version
              exit_status: 0
              stdout:
                - matches: "^tmux"
              command: /usr/bin/tmux -V
            - check: the AWS CLI v2 binary from devops-tools is installed under /usr/local/bin
              file:
                file: /usr/local/bin/aws
                exists: true
            - check: OpenTofu from devops-tools runs and reports its version
              exit_status: 0
              command: /usr/local/bin/tofu version
            - check: jq from devops-tools runs and reports its version
              exit_status: 0
              command: /usr/bin/jq --version
            - check: the supervised hermes agent service is running on the live deployment
              context:
                - runtime
              service:
                service: hermes
                running: true
            - agent-check: an operator can open a shell in the deployed box and launch the hermes agent together with any bundled AI CLI (claude/codex/gemini/forge) and developer tool from that one session
            - check: package=neovim
              id: hermes-full-neovim-package
              package:
                package: neovim
                installed: true
            - check: file=/usr/local/bin/tofu
              id: hermes-full-tofu-binary
              file:
                file: /usr/local/bin/tofu
                exists: true
            - check: file=/usr/bin/jq
              id: hermes-full-jq-binary
              file:
                file: /usr/bin/jq
                exists: true
            - check: file=/usr/bin/tmux
              id: hermes-full-tmux-binary
              file:
                file: /usr/bin/tmux
                exists: true
            - check: package=tmux
              id: hermes-full-tmux-package
              package:
                package: tmux
                installed: true

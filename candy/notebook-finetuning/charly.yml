notebook-finetuning:
    candy:
        version: 2026.144.1443
        description: |
            Unsloth fine-tuning notebook collection
            Provisions Unsloth fine-tuning notebooks into the workspace
            volume's `finetuning/` subdirectory at deploy time. Includes
            Unsloth_Setup, Vision_Training, SFT, GRPO, DPO, Reward,
            RLOO, and QLoRA variants. Data-only — no packages, no
            services. Consumed by jupyter-ml-notebook for an Unsloth-ready
            JupyterLab image.
        data:
            - src: data/finetuning
              volume: workspace
              dest: finetuning
        plan:
            - check: the finetuning subdirectory is provisioned in the workspace
              context:
                - runtime
              file:
                file: ${VOLUME_CONTAINER_PATH:workspace}/finetuning
                filetype: directory
            - check: the Unsloth_Setup producer notebook is present
              exit_status: 0
              stdout:
                - matches: "Unsloth_Setup"
              context:
                - runtime
              command: ls ${VOLUME_CONTAINER_PATH:workspace}/finetuning/
            - check: the Unsloth_Setup producer notebook is staged in the image data tree
              file:
                file: /data/workspace/finetuning/00_Unsloth_Setup.ipynb
                exists: true
            - check: the notebooks.yaml manifest cataloguing the collection is staged
              file:
                file: /data/workspace/finetuning/notebooks.yaml
                exists: true
            - check: a substantial collection of training notebooks is staged, not just the setup notebook
              exit_status: 0
              stdout:
                - matches: "[1-9][0-9]"
              command: find /data/workspace/finetuning -maxdepth 1 -name "*.ipynb" | wc -l
            - agent-check: the notebooks span the documented Unsloth training methods (SFT, GRPO, DPO, Reward, RLOO, QLoRA) as runnable examples
            - check: file=/data/workspace/finetuning
              id: notebook-finetuning-staged-dir
              file:
                file: /data/workspace/finetuning
                filetype: directory
            - check: file=/data/workspace/finetuning/03_SFT_Training_Qwen.ipynb
              id: notebook-finetuning-sft-staged
              file:
                file: /data/workspace/finetuning/03_SFT_Training_Qwen.ipynb
                exists: true
            - check: file=/data/workspace/finetuning/08_QLoRA_Multi_Adapter_Qwen_Think.ipynb
              id: notebook-finetuning-qlora-staged
              file:
                file: /data/workspace/finetuning/08_QLoRA_Multi_Adapter_Qwen_Think.ipynb
                exists: true

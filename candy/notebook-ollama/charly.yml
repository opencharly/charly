notebook-ollama:
    candy:
        version: 2026.144.1443
        description: |
            Ollama integration notebook collection
            Provisions Ollama (https://ollama.ai) integration notebooks
            into the workspace volume's `ollama/` subdirectory at deploy
            time. Producer 00_Ollama_Requests demonstrates the local-LLM
            HTTP API; consumers exercise specific patterns (chat, RAG,
            embeddings, tool calling). Pairs naturally with the
            `charly-ollama:ollama` server layer for a self-contained local
            LLM stack. Data-only — no packages, no services.
        data:
            - src: data/ollama
              volume: workspace
              dest: ollama
        plan:
            - check: the ollama subdirectory is provisioned in the workspace
              context:
                - runtime
              file:
                file: ${VOLUME_CONTAINER_PATH:workspace}/ollama
                filetype: directory
            - check: the Ollama_Requests producer notebook is present
              exit_status: 0
              stdout:
                - matches: "Ollama_Requests"
              context:
                - runtime
              command: ls ${VOLUME_CONTAINER_PATH:workspace}/ollama/
            - check: the Ollama_Requests producer notebook is staged in the image data tree
              file:
                file: /data/workspace/ollama/00_Ollama_Requests.ipynb
                exists: true
            - check: the notebooks.yaml manifest cataloguing the collection is staged
              file:
                file: /data/workspace/ollama/notebooks.yaml
                exists: true
            - check: a substantial collection of integration notebooks is staged, not just the producer
              exit_status: 0
              command: test "$(find /data/workspace/ollama -maxdepth 1 -name '*.ipynb' | wc -l)" -ge 6
            - agent-check: the notebooks span the documented client libraries (requests, OpenAI-compatible, native ollama, HuggingFace, Anthropic-style) as runnable examples
            - check: file=/data/workspace/ollama
              id: notebook-ollama-staged-dir
              file:
                file: /data/workspace/ollama
                filetype: directory
            - check: file=/data/workspace/ollama/02_Ollama_OpenAI.ipynb
              id: notebook-ollama-openai-staged
              file:
                file: /data/workspace/ollama/02_Ollama_OpenAI.ipynb
                exists: true
            - check: file=/data/workspace/ollama/03_Ollama_Library.ipynb
              id: notebook-ollama-library-staged
              file:
                file: /data/workspace/ollama/03_Ollama_Library.ipynb
                exists: true
            - check: file=/data/workspace/ollama/05_Ollama_Anthropic.ipynb
              id: notebook-ollama-anthropic-staged
              file:
                file: /data/workspace/ollama/05_Ollama_Anthropic.ipynb
                exists: true

notebook-openrouter:
    candy:
        version: 2026.144.1443
        description: |
            OpenRouter API integration notebook collection
            Provisions OpenRouter (https://openrouter.ai) integration
            notebooks into the workspace volume's `openrouter/` subdirectory
            at deploy time. Producer 00_OpenRouter_Basics demonstrates the
            API surface; consumers exercise specific use cases. Requires
            OPENROUTER_API_KEY at runtime — declared via env_require so
            `charly config` warns at deploy time when the env var is unset.
            Data-only — no packages, no services.
        env_require:
            - name: OPENROUTER_API_KEY
              description: "API key for OpenRouter LLM inference"
        data:
            - src: data/openrouter
              volume: workspace
              dest: openrouter
        plan:
            - check: the openrouter subdirectory is provisioned in the workspace
              context:
                - runtime
              file:
                file: ${VOLUME_CONTAINER_PATH:workspace}/openrouter
                filetype: directory
            - check: the OpenRouter_Basics producer notebook is present
              exit_status: 0
              stdout:
                - matches: "OpenRouter_Basics"
              context:
                - runtime
              command: ls ${VOLUME_CONTAINER_PATH:workspace}/openrouter/
            - check: the OpenRouter_Basics producer notebook is staged in the image data tree
              file:
                file: /data/workspace/openrouter/00_OpenRouter_Basics.ipynb
                exists: true
            - check: the notebooks.yaml manifest cataloguing the collection is staged
              file:
                file: /data/workspace/openrouter/notebooks.yaml
                exists: true
            - check: the basics notebook authenticates with the OPENROUTER_API_KEY declared via env_require
              file:
                file: /data/workspace/openrouter/00_OpenRouter_Basics.ipynb
                contains:
                    - contains: "OPENROUTER_API_KEY"
            - check: all three documented tutorial notebooks (basics, models, inference) are staged as runnable examples
              exit_status: 0
              stdout:
                - matches: "[1-9]"
              command: find /data/workspace/openrouter -maxdepth 1 -name "*.ipynb" | wc -l
            - check: file=/data/workspace/openrouter
              id: notebook-openrouter-staged-dir
              file:
                file: /data/workspace/openrouter
                filetype: directory
            - check: file=/data/workspace/openrouter/01_OpenRouter_Models.ipynb
              id: notebook-openrouter-models-staged
              file:
                file: /data/workspace/openrouter/01_OpenRouter_Models.ipynb
                exists: true
            - check: file=/data/workspace/openrouter/02_OpenRouter_Inference.ipynb
              id: notebook-openrouter-inference-staged
              file:
                file: /data/workspace/openrouter/02_OpenRouter_Inference.ipynb
                exists: true
            - check: file=/data/workspace/openrouter/notebooks.yaml
              id: notebook-openrouter-manifest-staged
              file:
                file: /data/workspace/openrouter/notebooks.yaml
                contains:
                    - contains: "OpenRouter Integration"

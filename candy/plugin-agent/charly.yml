plugin-agent:
    candy:
        version: 2026.199.1330
        description: |-
            Headless, daemon-free agent control plugin owning CUE-validated agent and
            agent-team kinds plus reflected `charly agent`, `charly tui`, and
            compatibility `charly tmux` commands. It persists sessions, runs, ordered
            evidence, incidents, RCA, and recovery decisions while routing every runtime
            and terminal operation through generic Provider.Channel target data. The
            tmux compatibility surface is a typed facade and never constructs remote
            tmux shell strings or accesses an operator tmux socket.
        plugin:
            source: github.com/opencharly/charly/candy/plugin-agent
            providers:
                - kind:agent
                - kind:agent-team
                - command:agent
                - command:tui
                - command:tmux
        plan:
            - check: the headless typed agent command tree is present in the compiled Charly binary
              id: agent-control-cli-present
              context: [runtime]
              command: charly agent runtime list
              exit_status: 0
            - check: the legacy tmux command grammar is preserved as a typed-provider compatibility facade
              id: typed-tmux-compatibility-present
              context: [runtime]
              command: charly tmux list --help
              exit_status: 0
              stdout:
                - contains: List compatibility tmux sessions

plugin-mount:
    candy:
        version: 2026.176.2400
        description: |-
            The `mount` MULTI-ROLE state-provision verb relocated into a candy.
            CHECK: `findmnt` the mountpoint via the live check engine and match
            source/filesystem/opts. ACT: render an idempotent `findmnt || mount`. A
            HOST-COUPLED verb on the sdk/kit contract (CheckVerbProvider +
            ProvisionActor), so it is COMPILED-IN-ONLY; matchers reuse sdk.MatchAll.
        plugin:
            source: github.com/opencharly/charly/candy/plugin-mount
            providers:
                - verb:mount
            primary:
                mount: mount
        plan:
            - check: the mount verb dispatches through the provider registry and probes a mountpoint via findmnt
              id: mount-verb-dispatches
              mount:
                mount: /proc
                filesystem: proc
              context: [runtime]

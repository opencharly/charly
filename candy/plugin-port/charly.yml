plugin-port:
    candy:
        version: 2026.176.1500
        description: |-
            The `port` check verb relocated into a candy: the in-container listening
            probe (ss/netstat) or a host-side TCP reachability dial. A HOST-COUPLED
            verb — its RunVerb runs against the live check engine
            (sdk/kit.CheckContext), served in EITHER placement: compiled-in,
            or OUT-OF-PROCESS via the CheckContextService reverse channel (F2). The
            relocation template for the other host-coupled check verbs/kinds.
        plugin:
            source: github.com/opencharly/charly/candy/plugin-port
            providers:
                - verb:port
            primary:
                port: port
        plan:
            - check: the port verb dispatches through the provider registry and probes a listening port on a live deployment
              id: port-verb-dispatches
              port: {port: 22, listening: true}
              context: [runtime]

plugin-tmux:
    candy:
        version: 2026.199.1330
        description: |-
            Generic typed terminal and terminal-agent runtime backed by tmux
            control mode. Each run owns an isolated socket; literal input,
            bracketed paste, keys, resize, signals, ordered raw output, snapshots,
            detach/reattach, exit status, and cleanup travel only through the
            CUE-generated Provider.Channel contract. It is placement-neutral and
            therefore works locally, over gRPC/SSH, and in nested deployments.

            Operators and MCP clients use `charly agent terminal`, so terminal
            operations never recursively invoke `charly cmd` or `charly shell`.
        plugin:
            source: github.com/opencharly/charly/candy/plugin-tmux
            providers:
                - terminal:tmux
                - agent-runtime:tmux
        plan:
            - check: the compiled provider registry exposes the typed tmux terminal channel
              id: tmux-terminal-provider-present
              context: [runtime]
              command: charly agent runtime status tmux --class terminal
              stdout:
                - contains: '"streaming":true'
            - check: the compiled provider registry exposes tmux as an agent runtime too
              id: tmux-agent-provider-present
              context: [runtime]
              command: charly agent runtime status tmux --class agent-runtime
              stdout:
                - contains: '"streaming":true'

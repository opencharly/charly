plugin-unix-group:
    candy:
        version: 2026.176.2600
        description: |-
            The `unix_group` MULTI-ROLE state-provision verb relocated into a candy.
            CHECK: `getent group` via the live check engine and compare gid. ACT:
            render an idempotent `groupadd`. A HOST-COUPLED verb on the
            sdk/kit contract (CheckVerbProvider + ProvisionActor), so it is
            COMPILED-IN-ONLY. No matchers — direct field comparison.
        plugin:
            source: github.com/opencharly/charly/candy/plugin-unix-group
            providers:
                - verb:unix_group
            primary:
                unix_group: unix_group
        plan:
            - check: the unix_group verb dispatches through the provider registry and probes a group via getent group
              id: unix-group-verb-dispatches
              unix_group:
                unix_group: root
                gid: 0
              context: [runtime]

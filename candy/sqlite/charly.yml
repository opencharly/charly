sqlite:
    candy:
        version: 2026.144.1443
        description: |
            Provides the sqlite3 command-line shell for creating and querying self-contained SQLite databases.
            The sqlite candy installs the sqlite package, which ships the
            sqlite3 CLI at /usr/bin/sqlite3. The binary runs SQL against an
            in-memory or on-disk SQLite database, so its behaviour is verifiable
            by executing a real query and asserting the returned row.
        distro:
            arch:
                package:
                    - sqlite
            fedora:
                package:
                    - sqlite
        plan:
            - check: the sqlite3 binary is installed at /usr/bin/sqlite3
              file:
                file: /usr/bin/sqlite3
                exists: true
            - check: the sqlite package is present in the image
              package:
                package: sqlite
                installed: true
            - check: sqlite3 reports a 3.x version string
              exit_status: 0
              stdout:
                - matches: "[0-9]+\\.[0-9]+\\.[0-9]+"
              command: sqlite3 --version
            - check: sqlite3 runs SQL against an in-memory database and returns the stored row
              stdout:
                - equals: "42"
              command: 'sqlite3 :memory: "CREATE TABLE t(x INTEGER); INSERT INTO t VALUES(42); SELECT x FROM t;"'

wl-screenshot-grim:
    candy:
        version: 2026.144.1443
        description: |
            Wayland screenshot capture via grim on wlroots compositors
            Installs grim, the de-facto screenshot tool for wlroots Wayland
            sessions. Verifiable: the grim binary lands at /usr/bin/grim and the
            grim package is registered — both fail on an image that installed
            nothing.
        distro:
            fedora:
                package:
                    - grim
        plan:
            - check: the grim screenshot binary is installed at /usr/bin/grim
              file:
                file: /usr/bin/grim
                exists: true
            - check: the grim package is registered with the package manager
              package:
                package: grim
                installed: true

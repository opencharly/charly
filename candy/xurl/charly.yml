xurl:
    candy:
        version: 2026.200.1305
        description: |
            xurl — X (Twitter) API CLI for posts, search, DMs, and media
            Installs the @xdevplatform/xurl npm package globally (npm -g into
            ~/.npm-global/bin, placed on PATH by the nodejs candy). The package's
            postinstall downloads the real platform binary, but npm >=12 blocks
            install scripts unless they are explicitly allowed (the builder image
            carries npm 12), so the plan runs that one audited download script
            itself after the global install. Verifiable: the xurl binary lands at
            ~/.npm-global/bin/xurl and runs `--help`.
        require:
            - nodejs
        plan:
            - run: fetch the xurl platform binary — npm >=12 blocks the package postinstall (install.js) by default; run the package's own download script explicitly
              command: node "${HOME}/.npm-global/lib/node_modules/@xdevplatform/xurl/install.js"
              run_as: ${USER}
            - check: the xurl CLI is installed in the npm global bin
              file:
                file: ${HOME}/.npm-global/bin/xurl
                exists: true
            - check: the xurl CLI runs and prints its usage
              exit_status: 0
              command: ${HOME}/.npm-global/bin/xurl --help

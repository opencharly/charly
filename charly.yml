                - contains: 'Container Engine'
              context:
                - runtime
              command:
                command: ${CHARLY_BIN} doctor
                in_container: false
# =================================================================
# check-commands-local — R10 witness for cutover C15's THREE remaining externalized COMMANDs + P15's command:box verbs
# (candy/plugin-{clean,settings,candy}: command:clean / command:settings / command:candy) — the
# sixth-through-eighth welded-command externalizations. ONE disposable kind:local deploy on
# host: local composes the three command plugins and runs each command host-side with a SAFE,
# read-only / dry-run / --help invocation, one check step per command:
#   - `charly settings list`  → exit 0 + stdout lists the resolved runtime-config keys (auto_enable);
#   - `charly candy --help`   → exit 0 (a TREE command whose --help proves dispatch WITHOUT mutating
#                                any candy manifest — the tree has no non-mutating read verb);
#   - `charly clean --dry-run`→ exit 0 + stdout carries the "would remove" retention report (dry-run
#                                touches nothing).
# clean + settings + candy are all COMPILED-IN and OWN their commands: each Invoke(OpRun) is dispatched
# in-proc (dispatchInProcCommand). clean + settings reach a shared core engine over a generic HostBuild
# seam (clean → "retention", settings → "settings"); candy owns its ENTIRE logic (the yaml.Node
# candy-manifest mutation) itself, sharing only the generic kit.SetByDotPath / kit.MappingChild utilities
# (sdk/kit/yaml.go). None uses a hidden core command — proving the externalized commands end-to-end.
# NOTE: `charly version` is a DELIBERATE value/risk EXCEPTION kept core — NOT "unfixable". RDD (2026-07-01)
# refuted the chicken-and-egg claim (pkgver()'s `bin/charly version` is a convenience; the CalVer is already
# Taskfile-computed via pkg/arch/calver.sh, so externalizing IS feasible), but it sheds ZERO deps and would
# make R9's canonical identity command depend on the plugin subsystem across 3 package repos — worst-value,
# highest-blast-radius; operator-decided to keep it a core command. Not exercised here (covered by
# candy/charly's own version check).
# =================================================================
check-commands-app:
    local:
        description: |-
            Minimal kind:local template for the check-commands-local bed — composes the
            command-only candy/plugin-{clean,settings,candy,box,authoring,status} plugins (no install
            content) so the bed exercises the externalized `charly clean`/`settings`/`candy`/`status` CLIs,
            the P15 `charly box …` build verbs (generate/validate/new/pkg), AND the P14b `charly box …`
            authoring verbs (set/add-candy/rm-candy/write/cat, nested under the box grammar group), AND
            (K5) `charly reap-orphans` (candy/plugin-substrate's command:reap-orphans, alongside its
            existing kind:pod/vm/k8s/local/android substrate capabilities) host-side.
        candy:
            - plugin-clean
            - plugin-settings
            - plugin-candy
            - plugin-box
            - plugin-authoring
            - plugin-status
            - plugin-substrate
check-commands-local:
    local:
        from: check-commands-app
        host: local
        disposable: true
        lifecycle: dev
        description: >-
            Sole proof of cutover C15's three remaining externalized COMMANDs (candy/plugin-clean, plugin-settings, plugin-candy — command:clean / command:settings / command:candy), the sixth-through-eighth welded-command externalizations in the core-externalization program. A disposable kind:local deploy on host: local runs each command host-side with a safe read-only / dry-run / --help invocation. clean + settings + candy are all COMPILED-IN and OWN their commands (each Invoke(OpRun) dispatched in-proc): clean + settings reach a shared core engine over a generic HostBuild seam (clean → "retention", settings → "settings"); candy owns its ENTIRE logic (the yaml.Node candy-manifest mutation) itself, sharing only the generic kit.SetByDotPath / kit.MappingChild utilities. None uses a hidden core command. Every command exits 0 — proving the externalized commands end-to-end. (`charly version` is excluded — it stays a core command; pkgver() stamps the package version via it.) P15 EXTENSION — the bed also composes candy/plugin-box and exercises the `charly box` command verbs (generate/validate/new/pkg, nested under the box grammar group): one step scaffolds a project + candy + box then drives box validate + box generate to a rendered Containerfile (proving command:new/validate/generate end-to-end, generate via InvokeProvider to the build-generate word), and one proves box pkg dispatches. P14a EXTENSION — the bed also composes candy/plugin-status and exercises the externalized `charly status` (command:status): one step asserts `charly status` + `charly status --json` (exit 0 + a JSON array), proving the status command OWNS the render + the PURE nested overlay and reaches the collectors over the "status-substrate" HostBuild seam. K5 EXTENSION — the bed also composes candy/plugin-substrate (already compiled-in for its 5 substrate kinds) and exercises the externalized `charly reap-orphans` (command:reap-orphans): a step asserts exit 0 and the clean-bed "no orphaned ephemerals" output, proving reap-orphans dispatches in-proc (dispatchCommand → Invoke(OpRun)) and its vm-liveness probe reaches the verb:libvirt peer provider over InvokeProvider (F10) rather than a deleted core-private accessor.
        plan:
            - check: command=charly settings list exits 0 and lists the resolved runtime-config keys (proving the externalized settings command owns the get/set/list/reset/path grammar + reaches the core config subsystem over the "settings" HostBuild seam)
              id: settings-list-runs
              exit_status: 0
              stdout:
                - contains: 'auto_enable'
              context:
                - runtime
              command:
                command: ${CHARLY_BIN} settings list
                in_container: false
            - check: command=charly candy --help exits 0 (proving the externalized candy command resolves + dispatches its own set/add-{rpm,deb,pac,aur} grammar without mutating any candy manifest)
              id: candy-help-runs
              exit_status: 0
              context:
                - runtime
              command:
                command: ${CHARLY_BIN} candy --help
                in_container: false
            - check: command=charly clean --dry-run exits 0 and prints the would-remove retention report (proving the externalized clean command owns the report + reaches the shared retention engine over the "retention" HostBuild seam, touching nothing)
              id: clean-dry-run-runs
              exit_status: 0
              stdout:
                - contains: 'would remove'
              context:
                - runtime
              command:
                command: ${CHARLY_BIN} clean --dry-run
                in_container: false
            - check: charly box new + candy + box + validate + generate render a valid box Containerfile in a scratch project, proving the box command plugin (candy/plugin-box, P15) dispatches its NESTED verbs end-to-end host-side — new via the sdk/kit scaffold engine, validate via the plugin's own validate ENGINE over the HostBuild("validate-project") resolved-project envelope (task #60), generate via InvokeProvider to the build-generate word then build-resolve
              id: box-new-validate-generate
              exit_status: 0
              context:
                - runtime
              command:
                command: "rm -rf /tmp/charly-p15-boxbed && ${CHARLY_BIN} box new project /tmp/charly-p15-boxbed && ${CHARLY_BIN} -C /tmp/charly-p15-boxbed box new candy my-candy && ${CHARLY_BIN} -C /tmp/charly-p15-boxbed candy add-rpm my-candy curl && ${CHARLY_BIN} -C /tmp/charly-p15-boxbed box new box my-box --base quay.io/fedora/fedora:43 --candies my-candy && ${CHARLY_BIN} -C /tmp/charly-p15-boxbed box validate && ${CHARLY_BIN} -C /tmp/charly-p15-boxbed box generate my-box && test -f /tmp/charly-p15-boxbed/.build/my-box/Containerfile"
                in_container: false
            - check: charly box pkg --help exits 0, proving the box command plugin pkg verb is registered and dispatches as a NESTED command under the box grammar group (candy/plugin-box, P15)
              id: box-pkg-dispatches
              exit_status: 0
              context:
                - runtime
              command:
                command: ${CHARLY_BIN} box pkg --help
                in_container: false
            - check: charly box authoring verbs (set/add-candy/rm-candy/write/cat) dispatch NESTED under the box grammar group and mutate a scratch project's charly.yml byte-faithfully, proving the authoring command plugin (candy/plugin-authoring, command:set/add-candy/rm-candy/write/cat, P14b) owns the yaml.Node candy-list edits (kit.MappingChild / kit.SaveYAMLNodeFile) + the dot-path writer (kit.SetByDotPath) + the project-rooted file escape hatch (resolveProjectFile) host-side — add-candy appends, rm-candy removes (curl absent after), set writes defaults.registry, write+cat round-trip a file. fetch/refresh stay covered by the Go tests + the golden-parity spike (they reenter core over HostBuild("cli") and hit the network, unsuitable for this bed)
              id: box-authoring-dispatches
              exit_status: 0
              stdout:
                - contains: 'hi-p14b'
              context:
                - runtime
              command:
                command: "rm -rf /tmp/charly-p14b-authoringbed && ${CHARLY_BIN} box new project /tmp/charly-p14b-authoringbed && ${CHARLY_BIN} -C /tmp/charly-p14b-authoringbed box new candy my-candy && ${CHARLY_BIN} -C /tmp/charly-p14b-authoringbed box new box my-box --base quay.io/fedora/fedora:43 --candies my-candy && ${CHARLY_BIN} -C /tmp/charly-p14b-authoringbed box add-candy my-box curl && ${CHARLY_BIN} -C /tmp/charly-p14b-authoringbed box rm-candy my-box curl && ! grep -q '\\- curl' /tmp/charly-p14b-authoringbed/box/my-box/charly.yml && ${CHARLY_BIN} -C /tmp/charly-p14b-authoringbed box set defaults.registry p14b-registry && grep -q 'p14b-registry' /tmp/charly-p14b-authoringbed/charly.yml && ${CHARLY_BIN} -C /tmp/charly-p14b-authoringbed box write hello.txt --content hi-p14b && ${CHARLY_BIN} -C /tmp/charly-p14b-authoringbed box cat hello.txt"
                in_container: false
            - check: charly status exits 0 (table render) AND charly status --json exits 0 emitting a JSON array — proving the externalized status command (candy/plugin-status, command:status, P14a) OWNS the render + the PURE nested overlay and reaches the collectors over the "status-substrate" HostBuild seam; FAILS if the externalization broke (unknown-command / seam failure → non-zero exit, or non-array output). P14b EXTENSION — the bed also composes candy/plugin-authoring and exercises the `charly box` AUTHORING verbs (set/add-candy/rm-candy/write/cat, nested under the box grammar group). One step scaffolds a project + box then drives box add-candy/rm-candy (yaml.Node candy-list edits via kit.MappingChild/kit.SaveYAMLNodeFile) + box set (kit.SetByDotPath) + box write/cat (the resolveProjectFile file escape hatch) end-to-end host-side, proving the authoring command plugin OWNS the charly.yml mutation surface with ZERO core reentry (fetch/refresh, which reenter core over HostBuild("cli") + hit the network, stay covered by the Go tests + the golden-parity spike).
              id: status-runs
              exit_status: 0
              stdout:
                - contains: '['
              context:
                - runtime
              command:
                command: "${CHARLY_BIN} status >/dev/null && ${CHARLY_BIN} status --json"
                in_container: false
            - check: command=charly reap-orphans exits 0 and reports "no orphaned ephemerals" on this clean bed (proving the externalized reap-orphans command, candy/plugin-substrate's command:reap-orphans (K5), dispatches in-proc and its deploykit.LoadBundleConfig-driven orphan scan runs end-to-end with zero ephemeral vm_state entries to reap)
              id: reap-orphans-runs
              exit_status: 0
              stdout:
                - contains: 'no orphaned ephemerals'
              context:
                - runtime
              command:
                command: ${CHARLY_BIN} reap-orphans
                in_container: false
# =================================================================
# check-gpu-local — R10 witness for cutover C11's externalized GPU/VFIO HOST-DETECTION
# (candy/plugin-gpu, verb:gpu) — the DETECTION cluster of the core-externalization program.
# A disposable kind:local deploy on host: local that runs the two deterministic, GPU-less
# `charly vm gpu` sub-commands host-side:
#   - `charly vm gpu status` → exits 0 and prints the VFIO/passthrough report; the in-core
#     Detect* shims (gpu_shim.go) resolve verb:gpu and Invoke the COMPILED-IN plugin, so
#     DetectVFIO() + MemlockLimitBytes() run THROUGH plugin-gpu (the IOMMU / vfio-pci /
#     memlock lines are always printed, so the assertion is host-independent).
#   - `charly vm gpu list`   → exits 0 (DetectVFIO() dispatches; prints the hostdevs block or
#     "No GPUs detected" — both host-dependent, so only exit 0 is asserted).
# The bed does NOT assert "GPUs: none detected": scanVFIO reports ANY display-class PCI
# device (incl. an integrated GPU), so that string is not host-deterministic — the always-
# printed header/IOMMU/vfio-pci/memlock lines are. The real driver-flip/NVENC path is NOT
# this bed's gate (it stays the gated cachyos GPU beds); the DRIVER-SWITCH + auto-allocation
# externalization is cutover C9 (arbiter + `charly vm gpu` coupling).
# =================================================================
check-gpu-app:
    local:
        description: |-
            Minimal kind:local template for the check-gpu-local bed — composes the
            compiled-in candy/plugin-gpu (verb:gpu, no install content) so the bed exercises
            the externalized GPU/VFIO host-detection via `charly vm gpu` host-side.
        candy:
            - plugin-gpu
check-gpu-local:
    local:
        from: check-gpu-app
        host: local
        disposable: true
        lifecycle: dev
        description: >-
            Sole proof of cutover C11's externalized GPU/VFIO HOST-DETECTION (candy/plugin-gpu, verb:gpu), the DETECTION cluster of the core-externalization program. A disposable kind:local deploy on host: local runs `charly vm gpu status` + `charly vm gpu list` host-side: the in-core Detect* shims (gpu_shim.go) resolve verb:gpu and Invoke the COMPILED-IN plugin, so DetectVFIO() + MemlockLimitBytes() run through plugin-gpu. Both commands exit 0 and print the VFIO/passthrough report — proving plugin-gpu loads + the detection code path dispatches through it on this host. The driver-switch + auto-allocation primitives stay in core and externalize with the arbiter (cutover C9).
        plan:
            - check: command=charly vm gpu status exits 0 and prints the VFIO/passthrough report (proving DetectVFIO + MemlockLimitBytes dispatch through the compiled-in verb:gpu plugin)
              id: gpu-status-runs
              exit_status: 0
              stdout:
                - contains: 'VFIO / GPU passthrough status'
                - contains: 'IOMMU:'
                - contains: 'vfio-pci driver:'
                - contains: 'memlock limit:'
              context:
                - runtime
              command:
                command: ${CHARLY_BIN} vm gpu status
                in_container: false
            - check: command=charly vm gpu list exits 0 (proving DetectVFIO dispatches through the compiled-in verb:gpu plugin on a GPU-less-or-iGPU host)
              id: gpu-list-runs
              exit_status: 0
              context:
                - runtime
              command:
                command: ${CHARLY_BIN} vm gpu list
                in_container: false

# =============================================================================
# check-structkind — R10 witness for F5 authored-member INPUT-threading (the
# foundation the group/pod/vm/k8s/local/android/candy structural-kind
# externalizations land on). The TOP node is an EXTERNAL STRUCTURAL plugin kind
# (examplestructkind, candy/plugin-example-structkind, out-of-process — NOT
# compiled in): its authored resource-MEMBER child is pre-decoded HOST-SIDE (the
# core buildBundleNode recursion) and threaded to the plugin's OpLoad via op.Env;
# the plugin ATTACHES it to its spec.Deploy reply, so the host folds a COMPLETE
# Bundle (with the AUTHORED member) into uf.Bundle — byte-equivalent to a builtin
# group (proven hermetically by TestExternalStructKind_StructuralDecode, which
# also covers peer + nested + cross-member ${HOST:} reconstruction). This bed is
# the RUNTIME leg: the reconstructed member (a kind:local host deploy applying
# check-structkind-layer) is brought up and the marker check authored on the
# MEMBER'S OWN plan runs — proving the reconstructed authored member DEPLOYS
# end-to-end. The check lives on the member's node plan, not in the candy: a
# composed candy's plan: never reaches a deploy-scope check runner for a non-image
# deploy, so a candy-authored check would silently never run. The deploy-config
# scalars (disposable/lifecycle/description) ride op.Params; the member rides
# op.Env (input-threaded).
# =============================================================================
check-structkind-app:
    local:
        description: |-
            Minimal kind:local template for the check-structkind member — composes
            check-structkind-layer (drops /etc/check-structkind-marker on the host) so the
            structural-kind member has a deterministic, collision-free host-side deploy effect.
        candy:
            - check-structkind-layer
check-structkind:
    examplestructkind:

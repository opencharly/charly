version: 2026.201.2300
# Canonical repo identity. After the 2026-06 box inversion main imports the three
# active distro submodules (arch / cachyos / fedora) ONE-DIRECTIONALLY to reference
# their relocated boxes; the submodules no longer import main as a namespace (they
# reach main's shared candies via @github refs), so the former mutual cycle is
# dissolved. See /charly-internals:go.
repo: github.com/opencharly/charly
import:
    # After the 2026-06 box inversion main owns NO boxes — it imports the three
    # active distro submodules ONE-DIRECTIONALLY to reference their relocated boxes
    # in the inline check/vm/local/k8s/android orchestration below (e.g. the
    # check-cross-* mechanism beds reference `fedora.web` / `fedora.chrome-headless`).
    # Each submodule owns its own base stack: arch + fedora are self-contained
    # (import: []) and cachyos imports the `arch` namespace; none imports main back
    # (they reach main's shared candies via @github refs), so the former
    # main↔cachyos / main↔fedora mutual cycles are dissolved.
    - arch: '@github.com/opencharly/distro-arch:v2026.183.1359'
    - cachyos: '@github.com/opencharly/distro-cachyos:v2026.183.1359'
    - fedora: '@github.com/opencharly/distro-fedora:v2026.183.1359'
# Main owns NO boxes after the 2026-06 box inversion — only the shared candy
# library + the inline check/vm/local/k8s orchestration. Discover candies only.
discover:
    - path: candy
      recursive: true
defaults:
    platform:
        - linux/amd64
    tag: auto
    registry: ghcr.io/opencharly
    build:
        - rpm
    merge:
        auto: false
        max_mb: 128
    # No defaults.builder: main owns no boxes after the box inversion, so there is
    # nothing to build multi-stage formats for. Each submodule box declares its own
    # builder map (arch.arch-builder / fedora.fedora-builder / cachyos via arch).
    # Build-speed tunables (project-wide). Precedence: CLI flag / env wins,
    # then these defaults, then a built-in fallback. See /charly-build:build.
    jobs: 4 # outer: concurrent IMAGE builds per DAG level (--jobs / CHARLY_BUILD_JOBS)
    podman_jobs: 0 # inner: stages per `podman build`; 0 = auto = min(NCPU, podman_jobs_cap)
    podman_jobs_cap: 8 # ceiling for the auto calc — proven safe on podman 5.8.2 (20-run race gate)
    # Heavy directories never COPYed by any Containerfile — merged into the
    # generated .containerignore/.dockerignore on top of the built-in baseline
    # (.git, bin, charly, *.md, editor/python/node cache-bust globs).
    context_ignore:
        - box
        - .check
        - output
        - dist
        - pkg
        - tests
        - .regression-snapshot
    cache: image # default build cache mode (image local read / registry read+write)
    # Reusable-artifact retention (auto-pruned at creation; also via `charly clean`).
    # 0 disables. See /charly-core:clean.
    keep_images: 3 # newest CalVer tags to keep per image after `charly box build`
    keep_check_runs: 3 # newest run dirs to keep per bed/score after `charly check run`
vm:
    vm:
        source:
            kind: cloud_image
            url: https://download.fedoraproject.org/pub/fedora/linux/releases/41/Cloud/x86_64/images/Fedora-Cloud-Base-Generic-41-1.4.x86_64.qcow2
            checksum:
                type: sha256
                value: 6205ae0c524b4d1816dbd3573ce29b5c44ed26c9fbc874fbe48c41c89dd0bac2
            base_user: fedora
        disk_size: 6G
        ram: 2G
        cpu: 2
        firmware: bios
        network:
            mode: user
        ssh:
            user: fedora
            port_auto: true
            key_source: generate
        cloud_init:
            package:
                - qemu-guest-agent
                - curl
            runcmd:
                - "setenforce 0 || true"
                - "sed -i 's/^SELINUX=.*/SELINUX=permissive/' /etc/selinux/config || true"
                - "echo '10.89.0.1 charly-web' >> /etc/hosts"
                - "systemctl enable --now qemu-guest-agent"
                - "for c in 21 33 46 82 124 196 208 220 1 5; do printf '\\033[48;5;%dm                    \\033[0m\\n' $c >> /dev/tty1; done || true"
vm-libvirt:
    vm: {libvirt: {devices: {channels: [{type: unix, name: org.qemu.guest_agent.0, path: '{{.VmStateDir}}/qga.sock'}], graphics: [{type: spice, autoport: "yes", listen: 127.0.0.1}], video: [{model: virtio, heads: 1, accel3d: false}]}}}
k3s-vm:
    vm:
        source:
            kind: cloud_image
            url: https://geo.mirror.pkgbuild.com/images/v20260701.551070/Arch-Linux-x86_64-cloudimg-20260701.551070.qcow2
            checksum:
                type: sha256
                value: a99844dda491606f81f463ce96851ae03d90ca8fa727671cac2da86a07a7cd61
            base_user: arch
        backend: libvirt
        disk_size: 20G
        ram: 4G
        cpu: 2
        machine: q35
        firmware: bios
        network:
            mode: user
            # `port_forwards` (plural) is the canonical key — VmNetwork.PortForwards
            # (yaml:"port_forwards"). The host side is the `auto` sentinel: the host
            # port is auto-allocated at vm-create (persisted in vm_state, the sibling
            # of ssh.port_auto), so the two beds sharing this entity (check-k3s-vm +
            # check-k8s-deploy-cluster) never collide on a hardcoded host port — the
            # concurrent host-port collision this feature removed. k3s_post rewrites the
            # retrieved kubeconfig's :6443 to the allocated host port from vm_state automatically.
            port_forwards:
                - "auto:6443"
        ssh:
            # port_auto auto-allocates the host SSH port at create (was a fixed
            # 2225 chosen to dodge collisions — port_auto does that automatically).
            # This bed is also the R10 for the ssh.port_auto feature: the entire
            # k3s deploy connects over SSH on the auto-allocated port.
            port_auto: true
            key_source: generate
        cloud_init:
            timezone: UTC
            package:
                - sudo
            charly_install:
                strategy: auto
        libvirt:
            devices:
                rng:
                    - model: virtio
                      backend: /dev/urandom
                memballoon:
                    model: virtio
# Arch Cloud VM backing check-charly-vm — the pac localpkg deploy witness. Plain
# disposable VM (no port forwards / k3s); charly is installed onto it by the bed's
# localpkg deploy, so the VM itself carries no opencharly layers.
# eval-vm — the disposable EVAL VM that every host-mutating `local:` check bed
# nests into. A `local:` node placed UNDER this vm node deploys INTO the guest via
# kit.NestedExecutor (tree position; the child carries no `host:` field), so the bed's
# candies write inside the guest and never touch the operator's workstation.
# See /charly-core:deploy "Deploy-into nesting"; the shipped precedent is box/arch's
# check-arch-vm -> arch-host. This entity is the shared read-only DISK BASE: each bed that
# references it (check-builder-vm / check-substrate / check-group-vm / check-structkind-vm) gets
# its OWN libvirt domain (charly-<bed>) + per-domain disk overlay + host ssh port, so the beds are
# collision-free BY CONSTRUCTION and run concurrently — the domain is keyed by the DEPLOY, never the
# entity (see /charly-vm:vm "per-deploy domain identity"; the naming logic is vmshared.VmDomainIdentity).
eval-vm:
    vm:
        source:
            kind: cloud_image
            url: https://geo.mirror.pkgbuild.com/images/v20260701.551070/Arch-Linux-x86_64-cloudimg-20260701.551070.qcow2
            checksum:
                type: sha256
                value: a99844dda491606f81f463ce96851ae03d90ca8fa727671cac2da86a07a7cd61
            base_user: arch
        backend: libvirt
        disk_size: 20G
        ram: 4G
        cpu: 2
        machine: q35
        firmware: bios
        ssh:
            port_auto: true
            key_source: generate
        cloud_init:
            timezone: UTC
            package:
                - sudo
# eval-host-vm — the disposable GUEST-AS-HOST VM for the check-local bed. Unlike
# eval-vm (the light nesting VM), this guest runs check-local as ITS OWN top-level
# `host: local` bed via the guest's ShellExecutor + HostDeployTarget (driven from
# the host by `charly --host`), so the kind:local layer-application ShellExecutor
# coverage is PRESERVED off the operator's workstation (a nested-as-member move
# would drop it to NestedExecutor). Needs: go+git (build the 2 out-of-tree plugins
# check-local composes — deploy:local + examplestep — in-guest), the welded charly
# (add_candy:[charly] on the bed), the pruned check-local project + sdk/ delivered
# by the bed's plan, and CHARLY_PROJECT_DIR in /etc/environment so the guest charly
# finds the delivered project (`charly --host` strips -C; ssh is non-interactive, so
# pam_env/UsePAM delivers /etc/environment — NOT ~/.bashrc). 6G RAM is headroom for
# the in-guest go-build (the pruned closure builds only 2 plugins, not the full
# fleet that OOM'd at 3.8G). The bed that references it (check-local-vm) gets its own domain
# charly-check-local-vm (keyed by the DEPLOY, not this entity) + per-domain disk overlay + host ssh
# port, so it is collision-free with every other eval VM bed by construction.
eval-host-vm:
    vm:
        source:
            kind: cloud_image
            url: https://geo.mirror.pkgbuild.com/images/v20260701.551070/Arch-Linux-x86_64-cloudimg-20260701.551070.qcow2
            checksum:
                type: sha256
                value: a99844dda491606f81f463ce96851ae03d90ca8fa727671cac2da86a07a7cd61
            base_user: arch
        backend: libvirt
        disk_size: 20G
        ram: 6G
        cpu: 2
        machine: q35
        firmware: bios
        ssh:
            port_auto: true
            key_source: generate
        cloud_init:
            timezone: UTC
            package:
                - sudo
                - go
                - git
                # rsync: the check-local-vm bed's "guest-project-delivered" step
                # rsyncs the pruned check-local closure into this guest over SSH —
                # the REMOTE end needs rsync too, not just the host. Latent gap: a
                # long-lived cached qcow2 happened to carry rsync from some prior
                # state, so this was never exercised on a genuinely fresh disk
                # until an operator-authorized disk purge exposed it (R9).
                - rsync
            runcmd:
                # The check-local bed delivers the pruned project to this path; the guest
                # charly resolves it via CHARLY_PROJECT_DIR (`charly --host` strips -C, and
                # `ssh host cmd` is non-interactive so /etc/environment — pam_env/UsePAM —
                # is the ONLY channel that reaches it).
                - "echo 'CHARLY_PROJECT_DIR=/home/arch/eval-project' >> /etc/environment"

charly-vm:
    vm:
        source:

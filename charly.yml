# =============================================================================
# check-group — R10 witness for the EXTERNALIZED `group` structural kind (C2-group).
# `group:` is no longer a compiled-in core KindProvider; it is served by the
# compiled-in structural plugin candy/plugin-group (kind:group, Structural:true).
# A REAL `group:` node here therefore exercises the full path: the loader recognizes
# `group` via the compiled-in provider, runPluginKind PRE-DECODES the authored member
# (buildResourceMemberChildren — the core recursion) + threads it to plugin-group's
# OpLoad via op.Env (F5 authored-member input-threading), and plugin-group attaches it
# to a targetless spec.Deploy the host folds into uf.Bundle — byte-equivalent to the
# former builtin groupKind. The reconstructed member (check-group-member, a kind:local
# deploy of check-group-app) is deployed INSIDE the disposable eval VM, and the marker
# check authored on the member's OWN plan asserts /etc/check-group-marker in the GUEST —
# proving a real group decode deploys end-to-end without mutating the host.
# =============================================================================
check-group-app:
    local:
        description: |-
            Minimal kind:local template for the check-group member — composes check-group-layer
            (drops /etc/check-group-marker) so the group member has a deterministic,
            collision-free deploy effect. The member is nested under check-group-vm, so this
            applies INSIDE the disposable eval VM over kit.NestedExecutor and the marker lands
            in the guest, never on the operator's host.
        candy:
            - check-group-layer
check-group:
    group:
        disposable: true
        lifecycle: dev
        description: >-
            Sole R10 witness of the externalized `group` structural kind (candy/plugin-group, C2-group): a REAL targetless `group:` deploy group decoded out of core through the compiled-in plugin-group over the F5 authored-member input-threading foundation. The authored member (check-group-member) is pre-decoded host-side and threaded to plugin-group via op.Env; the plugin attaches it to a targetless spec.Deploy the host folds into uf.Bundle. bringUpMembers deploys the member, and the marker check authored on the MEMBER'S OWN node plan asserts /etc/check-group-marker — proving a real group: decode reconstructs + deploys its authored member end-to-end, identical to the former builtin. The check must live on the member's node plan: a composed candy's plan: never reaches a deploy-scope check runner for a non-image deploy, so a check authored only in check-group-layer would silently never run (this bed printed "No plan steps to run." and asserted NOTHING before that fix). The member is a kind:local deploy of check-group-app NESTED UNDER the check-group-vm node, so it lands INSIDE the disposable eval VM via kit.NestedExecutor (tree position, no `host:` field) and the marker is written on the GUEST filesystem — never the operator's workstation. NOTE: a nested child runs on NestedExecutor over the guest venue, NOT ShellExecutor; the host-side ShellExecutor + HostDeployTarget arm is witnessed by check-local, which stays a top-level `host: local` bed for exactly that reason (see /charly-core:deploy "Deploy-into nesting").
    check-group-vm:
        vm:
            from: eval-vm
        # NESTED under the vm node (tree position) => the local: deploy lands INSIDE
        # the guest via kit.NestedExecutor. No `host:` field: the venue comes from the
        # parent. Precedent: box/arch check-arch-vm -> arch-host.
        check-group-member:
            local:
                from: check-group-app
                # The marker check is authored HERE, on the deploy node's OWN plan. A composed
                # candy's `plan:` is NEVER surfaced to a deploy-scope check runner for a non-image
                # deploy (checkLocalDeployScope sources only the template's plan, the node's plan,
                # and the folded entry). The check that lived only in check-group-layer therefore
                # never executed and this bed passed asserting nothing. hoistVenueSubtree lifts the
                # step to the group root with venue `check-group-vm.check-group-member` — the guest.
                plan:
                    - check: command=test -f /etc/check-group-marker && echo GROUP-MEMBER-DEPLOY-OK
                      id: cg-member-marker-in-guest
                      description: the group's authored member deployed INTO the eval VM and its layer wrote /etc/check-group-marker on the GUEST filesystem
                      stdout:
                          - contains: GROUP-MEMBER-DEPLOY-OK
                      context:
                          - runtime
                      command:
                          command: "test -f /etc/check-group-marker && echo GROUP-MEMBER-DEPLOY-OK"
# =============================================================================

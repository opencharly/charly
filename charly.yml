# reconstruction). This bed is the RUNTIME leg: the reconstructed authored member is a `vm:`
# node (check-structkind-vm) with a nested kind:local grandchild (check-structkind-member)
# that applies check-structkind-layer INSIDE the guest via kit.NestedExecutor, so the marker
# /etc/check-structkind-marker lands in the GUEST, never the operator's host. The F5 threading
# + structural decode are executor-agnostic (load-time), so nesting preserves them exactly as
# check-group's group:-decode survived nesting. The check lives on the member's node plan: a
# composed candy's plan: never reaches a deploy-scope check runner for a non-image deploy.
# Mirror: check-group.
# =============================================================================
check-structkind-app:
    local:
        description: |-
            Minimal kind:local template for the check-structkind member — composes
            check-structkind-layer (drops /etc/check-structkind-marker in the guest) so the
            structural-kind member has a deterministic, collision-free deploy effect.
        candy:
            - check-structkind-layer
check-structkind:
    examplestructkind:
        disposable: true
        lifecycle: dev
        description: >-
            Sole RUNTIME witness of F5 authored-member INPUT-threading, run inside the disposable eval VM: the top node is the external STRUCTURAL plugin kind examplestructkind (out-of-process, candy/plugin-example-structkind), whose authored resource-member child is pre-decoded host-side via the core buildBundleNode recursion and threaded to the plugin's OpLoad via op.Env; the plugin attaches it to its spec.Deploy reply so the host folds a COMPLETE Bundle (with the authored member) into uf.Bundle, byte-equivalent to a builtin group. The reconstructed authored member is a `vm:` node (check-structkind-vm) with a nested kind:local grandchild (check-structkind-member, a deploy of check-structkind-app) that lands INSIDE the eval VM guest via kit.NestedExecutor; the marker check authored on the member's OWN plan asserts /etc/check-structkind-marker in the GUEST — proving the reconstructed authored member deploys end-to-end off the operator's workstation. The check must live on the member's node plan: a composed candy's plan: never reaches a deploy-scope check runner for a non-image deploy. Hermetic peer/nested/cross-member reconstruction is proven by TestExternalStructKind_StructuralDecode.
    check-structkind-vm:
        vm:
            from: eval-vm
        # NESTED under the vm node (tree position) → the kind:local grandchild deploys INSIDE
        # the guest via kit.NestedExecutor. No `host:` field: the venue comes from the parent.
        # Mirror: check-group's check-group-vm → check-group-member.
        check-structkind-member:
            local:
                from: check-structkind-app
                plan:
                    - check: command=test -f /etc/check-structkind-marker && echo STRUCTKIND-MEMBER-DEPLOY-OK
                      id: sk-member-marker-in-guest
                      description: >-
                          The reconstructed authored member actually DEPLOYED into the eval VM guest:
                          its composed candy dropped /etc/check-structkind-marker on the GUEST filesystem.
                          Authored on the member's own node plan because a composed candy's plan: never
                          reaches a deploy-scope check runner for a non-image deploy.
                      stdout:
                          - contains: STRUCTKIND-MEMBER-DEPLOY-OK
                      context:
                          - runtime
                      command:
                          command: "test -f /etc/check-structkind-marker && echo STRUCTKIND-MEMBER-DEPLOY-OK"
# =============================================================================
# check-substrate — R10 witness for the EXTERNALIZED substrate structural kinds
# (C2-substrate, candy/plugin-substrate), run INSIDE the disposable eval VM. pod/vm/k8s/
# local/android are served by the compiled-in structural plugin candy/plugin-substrate. This
# bed exercises the LOCAL substrate decode in both shapes:
#   - check-substrate-app is a BARE `local:` TEMPLATE (top-level, no deploy) → foldSubstrateKind
#     pre-decodes it, validates against the KEPT #LocalValue def, and folds the ECHO into
#     uf.Local (the standalone TEMPLATE fold arm — decode-only, no host mutation);
#   - check-substrate is a `vm: {from: eval-vm}` bed whose nested `local:` member
#     (check-substrate-member, from: check-substrate-app) is decoded via foldSubstrateKind (the
#     deploy fold into uf.Bundle) and DEPLOYED into the guest via kit.NestedExecutor.
# The nested member applies check-substrate-layer INSIDE the guest; the marker check on the
# member's OWN plan asserts /etc/check-substrate-marker in the GUEST — proving both substrate
# shapes decode + deploy end-to-end off the operator's host, byte-equivalent to the former
# in-proc standaloneKind (also proven hermetically by TestSubstrateKind_BothShapesByteEquivalent).
# The decode is load-time (executor-agnostic), so nesting preserves it exactly as check-group's
# decode survived nesting. Mirror: check-group / check-builder-vm.
# =============================================================================
check-substrate-app:
    local:
        description: |-
            Minimal kind:local TEMPLATE for the check-substrate member — a BARE `local:` node (no
            from:/image:, no members) so it folds into uf.Local via candy/plugin-substrate's TEMPLATE
            fold arm (C2-substrate). Composes check-substrate-layer (drops /etc/check-substrate-marker
            in the guest) so the member has a deterministic, collision-free deploy effect.
        candy:
            - check-substrate-layer
check-substrate:
    vm:
        from: eval-vm
        disposable: true
        lifecycle: dev
        description: >-
            Sole R10 witness of the externalized substrate structural kinds (candy/plugin-substrate, C2-substrate), run inside the disposable eval VM: a BARE `local:` TEMPLATE (check-substrate-app, template shape → uf.Local) plus a nested `local:` DEPLOY member (check-substrate-member, deploy shape → uf.Bundle), BOTH decoded out of core through the compiled-in plugin-substrate. runPluginKind → foldSubstrateKind pre-decodes each node via the core loader, validates its value against the KEPT #LocalValue def, threads the canonical result to plugin-substrate's OpLoad, and folds the ECHO into uf.Local / uf.Bundle. The nested member applies check-substrate-layer INSIDE the guest via kit.NestedExecutor, and the marker check asserts /etc/check-substrate-marker in the GUEST — proving both substrate shapes reconstruct + deploy end-to-end off the operator's workstation, byte-equivalent to the former in-proc standaloneKind.
    check-substrate-member:
        local:
            from: check-substrate-app
            # NESTED under the vm node (tree position) → deploys INSIDE the guest via
            # kit.NestedExecutor. No `host:` field: the venue comes from the parent.
            plan:
                - check: command=test -f /etc/check-substrate-marker && echo SUBSTRATE-DEPLOY-OK
                  id: substrate-marker-in-guest
                  description: the nested substrate local DEPLOY (folded into uf.Bundle via plugin-substrate) applied its inherited template's marker layer INSIDE the eval VM guest
                  stdout:
                      - contains: SUBSTRATE-DEPLOY-OK
                  context:
                      - runtime
                  command:
                      command: "test -f /etc/check-substrate-marker && echo SUBSTRATE-DEPLOY-OK"
# candy/plugin-example-deploy (recognized at parse time via the plugin-declaration
# pre-scan, connected at deploy time via loadDeployPlugins). Add Invokes the plugin
# out-of-process; it dials back through the SDK Executor to write markers on the host
# venue under a disposable /tmp scratch dir, and returns a plugin-script reverse op
# the host records + replays at teardown. Zero operator side-effect (markers under
# /tmp, removed by `charly bundle del`).
check-exampledeploy:
    exampledeploy:
        disposable: true
        lifecycle: dev
        description: >-
            Sole proof of the external (out-of-process) deploy-target lifecycle (Add/Test/Update/Del) over the E3b ExecutorService reverse channel, AND of the F2 executable deploy channel AND the F3 build channel. Composes plugin-example-deploy as an external deploy: substrate (plus examplebuild-localpkg for the F3 leg); Add Invokes the host-built plugin out-of-process with the deployment's InstallPlan views — carrying the serializable per-step IR. The plugin dials back through the SDK Executor to (a) write an apply + a probe marker, (b) WALK + EXECUTE the plan's steps on the host venue (a file-write step lands /tmp/charly-exampledeploy-steps/written and a shell-hook env step lands env.d/plugin-example-deploy.env), (c) PUSH /tmp/charly-exampledeploy-steps/pushed via the reverse-channel PutFile leg, and (d) drive the RunHostStep host-engine reverse leg on examplebuild-localpkg's LocalPkgInstallStep — the host runs the EXISTING build engine (makepkg + pacman -U) and installs charly-f3-witness so /opt/charly-f3-witness/marker lands on the venue. Host-side command probes assert the probe marker, the executed-step effects, the pushed file, and the F3-built package marker; the fresh-rebuild (charly update) re-applies idempotently; teardown (charly bundle del) replays the recorded plugin-script reverse ops so every scratch dir is gone and the charly-f3-witness package is pacman -R'd (zero residue).
        add_candy:
            - plugin-example-deploy
            - examplebuild-localpkg
        plan:
            - check: command=test -f /tmp/charly-exampledeploy/check-exampledeploy/probe && echo EXAMPLEDEPLOY-PROBE-PRESENT
              id: exampledeploy-applied
              description: the external deploy plugin applied its probe marker on the host venue via the E3b reverse channel
              stdout:
                - contains: EXAMPLEDEPLOY-PROBE-PRESENT
              context:
                - runtime
              command:
                command: "test -f /tmp/charly-exampledeploy/check-exampledeploy/probe && echo EXAMPLEDEPLOY-PROBE-PRESENT"
                in_container: false
            - check: the external deploy plugin EXECUTED the file-write step from the round-tripped per-step IR — the authored dest holds the step's content
              id: exampledeploy-step-write
              description: F2 — the serializable InstallPlan.Steps round-tripped to the plugin, which executed the Op write step on the venue
              stdout:
                - contains: EXAMPLEDEPLOY-STEP-WRITE-OK
              context:
                - runtime
              command:
                command: "cat /tmp/charly-exampledeploy-steps/written"
                in_container: false
            - check: the external deploy plugin EXECUTED the shell-hook (env:) step — the rendered env.d file holds the contributed env var
              id: exampledeploy-step-env
              description: F2 — the ShellHook step round-tripped and the plugin materialized its env var on the venue
              stdout:
                - contains: EXAMPLEDEPLOY_STEP_ENV=present
              context:
                - runtime
              command:
                command: "cat /tmp/charly-exampledeploy-steps/env.d/plugin-example-deploy.env"
                in_container: false
            - check: the external deploy plugin PUSHED a file via the new reverse-channel PutFile leg — the pushed file landed on the venue with its content
              id: exampledeploy-putfile
              description: F2 — the ExecutorService PutFile RPC placed plugin-originated content on the venue
              stdout:
                - contains: EXAMPLEDEPLOY-PUTFILE-OK
              context:
                - runtime
              command:
                command: "cat /tmp/charly-exampledeploy-steps/pushed"
                in_container: false
            - check: F3 — the external deploy plugin drove the RunHostStep reverse leg on examplebuild-localpkg's LocalPkgInstallStep; the host built charly-f3-witness with makepkg and installed it with pacman -U, so its marker file is present on the venue
              id: exampledeploy-f3-buildstep
              description: F3 build channel — the host ran the EXISTING build engine (makepkg + pacman -U) over the reverse channel and installed the built package's artifact onto the venue
              stdout:
                - contains: EXAMPLEBUILD-LOCALPKG-OK
              context:
                - runtime
              command:
                command: "cat /opt/charly-f3-witness/marker"
                in_container: false
# pac localpkg AUTO-RESOLVE witness against the LOCAL charly candy (no @github):
# deploys candy/charly to a disposable Arch Cloud VM, where the layer's localpkg
# builds the opencharly-git package from pkg/arch (makepkg on the host) and
# `pacman -U`'s it onto the guest — pacman -U AUTO-RESOLVES the mandatory repo
# deps. This is main's own live proof of the localpkg DEPLOY path (the rpm/deb
# legs are proven by the fedora/debian/ubuntu submodule VM beds).
check-charly-vm:
    vm:
        from: charly-vm
        disposable: true
        lifecycle: dev
        description: >-
            Sole proof of the pac localpkg DEPLOY auto-resolve path on Arch — opencharly-git built via makepkg and installed with pacman -U auto-resolving the mandatory repo deps. A disposable libvirt Arch cloud VM (ssh.port_auto) overlays the LOCAL candy/charly whose localpkg builds opencharly-git on the host and pacman -U's it into the guest; one command probe asserts opencharly-git/podman/libvirt/tailscale/gocryptfs present, charly resolves to /usr/bin/charly, and charly version runs (LOCALPKG-PAC-AUTORESOLVE-OK).
        add_candy:
            - charly
        install_opts:
            allow_repo_changes: true
            allow_root_tasks: true
        plan:
            - check: |
                command=pacman -Q opencharly-git >/dev/null 2>&1 &&
                pacman -Q podman >/dev/null 2>&1 &&
                pacman -Q libvirt >/dev/null 2>&1 &&
                pacman -Q tailscale >/dev/null 2>&1 &&
                pacman -Q gocryptfs >/dev/null 2>&1 &&
                test "$(command -v charly)" -ef /usr/bin/charly &&
                charly version &&
                echo LOCALPKG-PAC-AUTORESOLVE-OK
              id: localpkg-pac-autoresolve
              description: charly installed as the opencharly-git pacman package via localpkg, mandatory repo deps auto-resolved by pacman -U
              stdout:
                - contains: LOCALPKG-PAC-AUTORESOLVE-OK
              exit_status: 0
              context:
                - runtime
              command: |
                pacman -Q opencharly-git >/dev/null 2>&1 &&
                pacman -Q podman >/dev/null 2>&1 &&
                pacman -Q libvirt >/dev/null 2>&1 &&
                pacman -Q tailscale >/dev/null 2>&1 &&
                pacman -Q gocryptfs >/dev/null 2>&1 &&
                test "$(command -v charly)" -ef /usr/bin/charly &&
                charly version &&
                echo LOCALPKG-PAC-AUTORESOLVE-OK
            - check: the welded command plugins are baked beside charly at /usr/lib/charly/plugins so a core welded command dispatches project-less on the opencharly-git install
              id: welded-command-project-less
              description: the opencharly-git package bakes the command:<word> plugins (doctor/vm/clean/…) beside the binary at /usr/lib/charly/plugins, so `charly doctor` dispatches project-less on the installed package (FAILS on a package that shipped only the binary)
              stdout:
                - contains: WELDED-CMD-PROJECT-LESS-OK
              exit_status: 0
              context:
                - runtime
              command: |
                test -x /usr/lib/charly/plugins/plugin-doctor &&
                test -f /usr/lib/charly/plugins/plugin-doctor.providers &&
                test -x /usr/lib/charly/plugins/plugin-vm &&
                test -x /usr/lib/charly/plugins/plugin-clean &&
                cd /tmp &&
                charly doctor 2>/dev/null | grep -q 'Container Engine' &&
                echo WELDED-CMD-PROJECT-LESS-OK
charly-cli:
    group:
        description: AI check — an agent operates the charly management command surface (build → deploy → status) end-to-end.
        iterate:
            sandbox: check-sandbox
            agent: [claude]
            plateau_iteration: 3
            prompt: |
                == Where you are ==
                Your cwd is /workspace — a fresh per-run clone of the OpenCharly
                project, bind-mounted into this freshly-rebuilt ${TARGET_NAME}. You
                have FULL sudo + nested podman + the `charly` CLI. Host services are
                invisible; you cannot conflict with them.

                == Bed purpose ==
                This bed proves an agent can OPERATE the charly management command
                surface end-to-end. Use `charly box build os` to build the `os` image,
                then `charly bundle add os os` (or `charly start os`) to bring it up as a
                running pod, and `charly status` to confirm it. The bed's `check:` steps
                assert the `os` pod is running with its predetermined marker file —
                satisfy them by driving the real charly commands, not by hand-crafting
                state. The full `charly` CLI + the MCP surface (`charly mcp serve` on
                ${TARGET_NAME}) are available; how you satisfy the spec is your call.
            note: false
            env: {}
            mcp_endpoint: "http://localhost:18765/mcp"
    os:
        pod:
            agent_provisioned: true
            plan:
                - check: the os pod the agent built with `charly box build` + started with charly is running
                  process:
                    process: supervisord
                    running: true
                - check: the built os image's predetermined marker file is present
                  file:
                    file: /etc/charly-os-marker
                    contains: ["charly-os-content-marker"]
default:
    group:
        description: Default benchmark — progressive verb-coverage curriculum across the full `charly check` surface (system state → network → cross-pod → MCP → Kubernetes → desktop → VM → nested).
        iterate:
            sandbox: check-sandbox
            agent: [claude]
            plateau_iteration: 3
            prompt: |
                == Where you are ==
                Your cwd is /workspace — the project tree, bind-mounted from the host
                into this freshly-rebuilt ${TARGET_NAME}. You have FULL sudo + nested
                podman + every package the plan needs. Host services are completely
                invisible; you cannot conflict with them.

                Your `/workspace` is a fresh per-run clone of the OpenCharly
                source repository — the full git tree (with submodules
                initialized), the `charly` CLI binary, and every layer, image,
                pod, VM, and Kubernetes cluster definition the project
                already ships (`candy/`, `box/<name>/charly.yml`, plus the
                pod/vm/k8s/check kinds inline in `charly.yml`). Your session has the project's plugin skills
                loaded (`/charly-check:check`, `/charly-core:deploy`, `/charly-image:image`, `/charly-image:layer`,
                `/charly-build:build`, plus per-pod plugins (`/charly-jupyter:*`, `/charly-coder:*`, etc.) and foundation plugins (`/charly-distros:*`, `/charly-infrastructure:*`, `/charly-tools:*`), …). All of these
                are available to be used if you decide to do so — they may
                be useful for most of the steps. The plan specifies
                what each pod must do; how you satisfy each specification
                is entirely your call.

                == Phase progression — curriculum-style ==
                ${PHASE_INTRO}
                You are in PHASE ${PHASE} of ${PHASE_TOTAL}. The benchmark adds one
                include: block per phase: phase 1 starts with the easiest, each later phase
                brings the previous plan segments BACK plus one new one. State persists
                across phases — pods you deployed in phase 1 stay running for phase
                2's scoring. Several later plan segments EXPLICITLY consume earlier
                phases' fixtures (phase 6 and phase 7 both reach back to phase 2's
                HTTP fixture across the pod network) — keeping every phase's pods
                healthy is part of the contract.

                == Iteration semantics within this phase — NO RUSHING ==
                Iteration ${ITERATION} of an UNBOUNDED loop within phase ${PHASE}.
                Score progression: ${BEST_SCORE} (last delta: ${SCORE_DELTA})

                The phase ends when:
                  - every in-scope check: step passes (solved-all → next phase begins), OR
                  - you fail to improve your score for ${PLATEAU_ITERATION} iterations
                    in a row (genuine plateau → next phase begins anyway).

                There is NO maximum iteration count per phase. Take all the time you
                need. A complete solution in iteration 7 outscores a partial solution
                in iteration 1. Correctness > speed. NO shortcuts. NO "ship something
                and hope" — every check the harness probes you can re-probe
                yourself the same way before exiting.

                == Plan you must solve — IN-SCOPE FOR THIS PHASE ==
                ${PLAN}

                The plan is a TREE of agent-provisioned nodes: each node's NAME
                is the container you must deploy, and the steps nested under it
                run in that container — the step's venue comes from its TREE
                POSITION, not a `pod:` field. Read the tree; collect the node
                names; deploy a container named `charly-<node>` for each. A nested
                node (`a.b.c`) is a container deployed inside its parent (reached
                by a dotted venue). Some `include:` steps splice fixture plans
                whose nodes (e.g. `charly-web`) are reached from other nodes'
                steps across the pod network — those fixtures must remain running
                across phases.

                Some steps carry `depends_on: [...]` — they only run after the
                named upstream steps pass. If you see a step marked
                `verdict: skipped` with `skipped_reason: "dep-unmet: <name>"`, the
                upstream <name> failed; fix that one first.

                Notes: ${NOTES}

                == Ground rules ==
                  - The bed's plan steps are immutable — they live in the check: block of the project charly.yml.
                  - The ${TARGET_NAME} sandbox was rebuilt FRESH for this run; it persists
                    across iters but is destroyed + recreated NEXT run.
                  - Every pod a step references MUST be running at exit (that's
                    what gets scored). Fixtures from earlier phases must STAY
                    running for later phases' consumer probes.
                  - There is NO premium on speed. There IS a premium on every
                    check: step you can make pass.

                == How harness scoring relates to your iteration ==
                The harness scorer is AUTHORITATIVE. At iter end it physically
                re-runs every probe against the live system EXCEPT for the
                state-dependent capture probes listed below — for those, the
                harness validates the artifact YOUR iteration produced (the file
                at the step's `artifact:` path), with a strict mtime freshness
                check that rejects pre-staged or stale files.

                Re-run by harness independently (you cannot influence the verdict):
                  - Status / evaluation / listing verbs (cdp:status, cdp:eval,
                    wl:status, libvirt:info, libvirt:domain-xml, libvirt:guest/
                    ping, libvirt:guest/exec, k8s:nodes/wait-ready/addons/raw,
                    mcp:ping/list-tools/call/read, dbus:list/call/notify).
                  - File / process / package / port / service / command /
                    matching / http / dns / addr / interface / mount / kernel-
                    param / user / group probes.
                  - All deploy-tree resolution probes.

                Validates YOUR iteration's artifact (state-dependent capture only):
                  - cdp:screenshot, wl:screenshot, vnc:screenshot,
                    libvirt:screenshot, spice:screenshot, spice:cursor, record:stop.
                  - For these the harness validates artifact_min_bytes /
                    artifact_min_dimensions / artifact_not_uniform /
                    artifact_min_cast_events against the file at the step-
                    declared `artifact:` path, with mtime ≥ iter start.

                == MANDATORY before exiting this iteration ==
                Run `charly check self-evaluate` and read its output BEFORE you
                exit. It runs every in-scope probe against live systems via the
                SAME code path the harness scorer will invoke at iter end. The
                verdict it prints (pass / fail / skipped per step) is what
                the harness will record.

                Why this is mandatory: for state-dependent capture probes,
                self-evaluate's invocation IS what writes the canonical artifact
                the harness then validates. Skipping self-evaluate means missing
                or stale artifacts → those steps fail. For other probes,
                self-evaluate gives you a chance to see the harness's verdict
                and fix your deployment BEFORE the iter ends.

                Do not consider the iteration complete until self-evaluate
                prints the verdict you intended.

                == When a source-code fix can't apply mid-run ==
                The harness loop runs as a long-lived Go process (PID inside
                ${TARGET_NAME}). Source fixes you make to /workspace/charly/*.go and
                rebuilds appear on disk via the bind-mount, BUT the running
                harness PID has the OLD binary mmap'd and CANNOT hot-reload Go
                code. Your fix takes effect on the NEXT harness run — not the
                current one. Recommended response: record the fix in your
                iteration notes and exit this iteration cleanly; the next run
                will fork a fresh PID and pick up the new binary. Do NOT loop
                iterations 3+ trying to make the running PID see your on-disk
                fix; the score won't change this run.
            note: true
            env: {}
            mcp_endpoint: "http://localhost:18765/mcp"
    os:
        pod:
            agent_provisioned: true
            plan:
                - check: the predetermined marker file exists at /etc/charly-os-marker
                  file:
                    file: /etc/charly-os-marker
                    exists: true
                - check: the marker file contains the predetermined content marker
                  file:
                    file: /etc/charly-os-marker
                    contains: ["charly-os-content-marker"]
                - check: the predetermined system package is installed
                  package:
                    package: bash
                    installed: true
                - check: a predetermined process is running by name
                  process:
                    process: bash
                    running: true
                - check: the predetermined user account is present in the user database
                  user:
                    user: root
                    uid: 0
                - check: the predetermined group is present in the group database
                  unix_group:
                    unix_group: root
                    gid: 0
                - check: the predetermined mountpoint is listed in the mount table
                  mount:
                    mount: /proc
                    filesystem: proc
                - check: the predetermined kernel parameter is readable from sysctl
                  kernel-param:
                    kernel-param: kernel.hostname
                    value: {matches: "."}
                - check: the loopback interface is present
                  interface:
                    interface: lo
                    addrs: ["127.0.0.1/8"]
                - agent-check: an in-process matcher resolves a literal predetermined string
    web:
        pod:
            agent_provisioned: true
            plan:
                - check: the HTTP server's system package is installed
                  package:
                    package: nginx
                    installed: true
                - check: the HTTP server's port is listening inside the pod
                  port:
                    port: 8080
                    listening: true
                - check: the HTTP server's port is reachable from the host
                  addr:
                    addr: "127.0.0.1:${HOST_PORT:8080}"
                    reachable: true
                - check: GET / returns 200 with the predetermined content marker
                  http:
                    http: "http://localhost:8080/"
                    status: 200
                    body: {contains: ["charly-web-content-marker"]}
                - check: the served content file persists on disk with the predetermined marker
                  file:
                    file: /srv/fixture/index.html
                    exists: true
                    contains: ["charly-web-content-marker"]
                - check: a self-curl from inside the pod returns the predetermined marker
                  exit_status: 0
                  stdout: {contains: ["charly-web-content-marker"]}
                  command: "curl -fsS http://127.0.0.1:8080/"
    redis:
        pod:
            agent_provisioned: true
            plan:
                - check: the data store's primary process is running
                  process:
                    process: redis-server
                    running: true
                - check: the data store is reachable from a separate pod
                  exit_status: 0
                  command: "ss -tln | grep ':6379' | grep -v '127.0.0.1'"
                - check: the nonce-protected key is readable on the server pod with the correct value
                  stdout: {contains: ["${EVAL_NONCE_VALUE}"]}
                  command: "redis-cli get bench:${EVAL_NONCE_KEY}"
    redis-client:
        pod:
            agent_provisioned: true
            plan:
                - check: the client pod has the data store's client tool installed
                  exit_status: 0
                  command: "command -v redis-cli"
                - check: the client pod successfully writes the nonce-protected key into the data store
                  stdout: {contains: [OK]}
                  command: "redis-cli -h charly-redis SET bench:${EVAL_NONCE_KEY} ${EVAL_NONCE_VALUE}"
    mcp:
        pod:
            agent_provisioned: true
            plan:
                - include: box:fedora.jupyter
                - run: remove any prior probe notebook
                  exit_status: 0
                  command:
                    command: "rm -f /workspace/mcp-A.ipynb"
                    in_container: true
                - check: notebook_create writes the file but does not open a CRDT room
                  mcp:
                    method: call
                    tool: notebook_create
                    input: '{"path":"mcp-A.ipynb"}'
                  timeout: 30s
                - check: room_list does NOT contain mcp-A.ipynb
                  mcp:
                    method: call
                    tool: room_list
                    input: '{}'
                  stdout: {not_contains: "mcp-A.ipynb"}
                  timeout: 30s
                - run: clean state
                  exit_status: 0
                  command:
                    command: "rm -f /workspace/mcp-B.ipynb"
                    in_container: true
                - run: create
                  mcp:
                    method: call
                    tool: notebook_create
                    input: '{"path":"mcp-B.ipynb"}'
                  timeout: 30s
                - check: cell_insert without prior open auto-creates the room
                  mcp:
                    method: call
                    tool: cell_insert
                    input: '{"path":"mcp-B.ipynb","index":0,"source":"x","cell_type":"markdown"}'
                  timeout: 60s
                - check: room_list now contains mcp-B.ipynb
                  mcp:
                    method: call
                    tool: room_list
                    input: '{}'
                  stdout: {contains: "mcp-B.ipynb"}
                  timeout: 30s
                - run: clean state
                  exit_status: 0
                  command:
                    command: "rm -f /workspace/mcp-D.ipynb"
                    in_container: true
                - run: create
                  mcp:
                    method: call
                    tool: notebook_create
                    input: '{"path":"mcp-D.ipynb"}'
                  timeout: 30s
                - run: MCP-side cell_insert auto-creates the room
                  mcp:
                    method: call
                    tool: cell_insert
                    input: '{"path":"mcp-D.ipynb","index":0,"source":"hello","cell_type":"markdown"}'
                  timeout: 60s
                - check: transient UI-style WebSocket connect (in-container python)
                  exit_status: 0
                  command:
                    command: |-
                        python3 -c '
                        import asyncio
                        async def main():
                            try:
                                import websockets
                            except ImportError:
                                print("websockets not installed; skipping ws probe"); return
                            try:
                                ws = await asyncio.wait_for(
                                    websockets.connect("ws://127.0.0.1:8888/api/yjs/json:notebook:mcp-D.ipynb"),
                                    5,
                                )
                                await asyncio.sleep(1)
                                await ws.close()
                                print("ws-probe-ok")
                            except Exception as e:
                                print(f"ws-probe-noop: {e}")
                        asyncio.run(main())
                        '
                    in_container: true
                - check: room_list still shows EXACTLY one entry for the path
                  mcp:
                    method: call
                    tool: room_list
                    input: '{}'
                  stdout:
                    - matches: 'mcp-D\.ipynb'
                  timeout: 30s
                - run: clean state
                  exit_status: 0
                  command:
                    command: "rm -f /workspace/mcp-E.ipynb"
                    in_container: true
                - run: create
                  mcp:
                    method: call
                    tool: notebook_create
                    input: '{"path":"mcp-E.ipynb"}'
                  timeout: 30s
                - run: MCP cell_insert auto-creates the room
                  mcp:
                    method: call
                    tool: cell_insert
                    input: '{"path":"mcp-E.ipynb","index":0,"source":"x","cell_type":"markdown"}'
                  timeout: 60s
                - run: snapshot the pod log mark
                  exit_status: 0
                  command:
                    command: "date +%s > /tmp/mcp-E.markstamp"
                    in_container: true
                - check: transient UI-style WebSocket connect to provoke _clean_room
                  exit_status: 0
                  command:
                    command: |-
                        python3 -c '
                        import asyncio
                        async def main():
                            try:
                                import websockets
                            except ImportError:
                                return
                            try:
                                ws = await asyncio.wait_for(
                                    websockets.connect("ws://127.0.0.1:8888/api/yjs/json:notebook:mcp-E.ipynb"),
                                    5,
                                )
                                await asyncio.sleep(0.5)
                                await ws.close()
                            except Exception:
                                pass
                        asyncio.run(main())
                        '
                    in_container: true
                - check: let upstream _clean_room settle
                  exit_status: 0
                  command:
                    command: "sleep 2"
                    in_container: true
                - check: no 'Task exception was never retrieved' or 'is not in list' since the mark
                  exit_status: 0
                  command:
                    command: |-
                        MARK=$(cat /tmp/mcp-E.markstamp); LOG=$(journalctl -t supervisord --since "@$MARK" 2>/dev/null || cat /tmp/jupyter*.log 2>/dev/null || true); echo "$LOG" | grep -E 'Task exception was never retrieved|is not in list' && exit 1 || exit 0
                    in_container: true

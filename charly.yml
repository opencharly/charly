vm-k3s-vm:
    k8s:
        box: ""
        kubeconfig_context: vm-k3s-vm
claude:
    agent:
        description: Anthropic Claude Code CLI — autonomous coding agent.
        # --verbose + --output-format stream-json emit one JSON object per
        # message in the agent loop (system / assistant / user / tool_use /
        # tool_result / result). The harness parses each line, embeds it
        # into result-{calver}.yml under iteration[].runner_event, and tees
        # the raw NDJSON to .harness/<score>/runs/<run-id>/iter<k>/runner.ndjson
        # for byte-exact debugging. See /charly-check:check for the score
        # runner and its stream-json wire format.
        command: [claude, -p, --verbose, --output-format, stream-json, --dangerously-skip-permissions, "${PROMPT}"]
        output_format: stream-json
        version_command: [claude, --version]
        credential:
            - {src: ~/.claude/.credentials.json, dst: ~/.claude/.credentials.json}
codex:
    agent:
        description: OpenAI Codex CLI — coding agent.
        command: [codex, exec, "${PROMPT}"]
        version_command: [codex, --version]
        credential:
            - {src: ~/.config/codex/auth.json, dst: ~/.config/codex/auth.json, optional: true}
gemini:
    agent:
        description: Google Gemini CLI.
        command: [gemini, chat, "${PROMPT}"]
        version_command: [gemini, --version]
        credential:
            - {src: ~/.config/gcloud/application_default_credentials.json, dst: ~/.config/gcloud/application_default_credentials.json, optional: true}
kimi:
    agent:
        description: Moonshot Kimi Code CLI — coding agent.
        command: [kimi, -p, "${PROMPT}"]
        version_command: [kimi, --version]
        credential:
            - {src: ~/.kimi-code/credentials/kimi-code.json, dst: ~/.kimi-code/credentials/kimi-code.json, optional: true}
# =============================================================================
# kind: check — disposable, zero-operator-side-effect R10 test beds.
# =============================================================================
# Each entry is a disposable deployment (a BundleNode), folded into the
# Bundle map at load time so every deploy verb resolves it by name. Run the
# full R10 acceptance sequence on any of them — build → check box → deploy →
# check live → fresh update (R10 gate) → tear down — with:
#
#     charly check run <bed>          # one bed
#     charly check run --all-beds     # every bed, name-sorted
#
# `disposable: true` is the SOLE authorization for that unattended destroy +
# rebuild (see /charly-internals:disposable). Naming: check-<descriptor>-<kind>,
# dropping a redundant suffix when descriptor == kind AND the short form is
# free (check-local, check-pod). The harness AI-sandbox pod is named
# `check-sandbox` (the score `pod:` target), kept disjoint from these beds.
#
# Bed-to-verb coverage map:
#   check-k3s-vm               (vm)  — k8s (all 13 methods) + guest-side
#                                     file/service/port/process, http via
#                                     port-forward, the external vm deploy end-to-end
#   check-k8s-deploy           (vm)  — the EXTERNALIZED deploy:k8s substrate (F1):
#                                     a k3s VM cluster + a target:k8s workload
#                                     member (check-k8s-deploy-app) applied via the
#                                     out-of-process plugin's kubectl apply -k
#   check-pod                  (pod) — combined: kind:image build + kind:layer
#                                     composition order + kind:pod runtime
#                                     (nc :18794 + supervisord) + every
#                                     DeployTarget rendering path
#   check-local                (local) — kind:local layer apply via ShellExecutor
#   check-jupyter-pod          (pod) — jupyter-mcp regression coverage
#   check-jupyter-ml-pod       (pod) — jupyter-ml spacy/quarto + GPU MCP probes
#   check-versa-pod            (pod) — versa OSM analytics + vector-tile + marimo MCP
#   check-android-emulator-pod (pod) — Android 16 emulator (/dev/kvm) + adb/appium
#   check-openclaw-pod         (pod) — minimal openclaw gateway on the cachyos base
#   check-openclaw-full-pod    (pod) — maximal openclaw-full on cachyos (AUR chrome,
#                                     gogcli@latest, ffmpeg/sqlite arch coverage)
#   check-openclaw-desktop-pod (pod) — all-in-one: selkies desktop + openclaw-full
#                                     (claude-code/codex/gemini) + CPU ollama +
#                                     nested charly toolchain (charly+container-nesting)
#
# Zero-operator-side-effect: pod beds → rootless podman; check-k3s-vm → libvirt
# qcow2; check-local → a disposable scratch dir. No test writes to ~/.local/bin,
# ~/.config/opencharly, /etc, /usr, or any operator-side directory.
# =============================================================================
# check-k3s-vm — disposable libvirt VM running k3s-server. Kubeconfig is
# pulled back for host-side k8s: probes (all 13 methods) via the forwarded
# :6443. A VM (native kernel + cgroup tree) sidesteps the rootless-podman
# cpuset-delegation blocker that makes a pod-hosted k3s impossible.
# References the vm: entity `k3s-vm` (defined below).
check-k3s-vm:
    vm:
        from: k3s-vm
        disposable: true
        lifecycle: dev
        description: >-
            Sole deterministic proof of the external-vm-deploy->k8s end-to-end path and the full 13-method k8s probe surface against a real k3s control plane, and the R10 for ssh.port_auto. A disposable libvirt Arch cloud VM (an auto-allocated host->guest 6443 forward, charly installed post-boot via the vm substrate (EnsureCharlyInGuest)) overlays k3s-server over SSH, then runs guest command/process/port/file probes plus the full k8s suite (nodes/wait-nodes/pods/wait-ready/addons/ingressclass/storageclass/raw/service) against cluster vm-k3s-vm, an agent-check matching probe, and a host-side charly status --json (status-shows-vm).
        add_candy:
            - k3s-server
        env:
            # The host port is auto-allocated (network.port_forwards: ["auto:6443"]);
            # k3s_post rewrites the retrieved kubeconfig's :6443 to the allocated host
            # port from vm_state automatically, so NO hardcoded K3S_KUBECONFIG_SERVER
            # override is set (a fixed value would force a stale port). K3S_SERVER_HOSTNAME
            # stays for the tls-san / hostname rewrite.
            K3S_SERVER_HOSTNAME: 127.0.0.1
        install_opts:
            with_service: true
            allow_repo_changes: true # pacman sync / repo key import
            skip_incompatible: true # skip rpm:/deb:-only layer sections
            verify: true
        plan:
            - check: command=id
              id: kv-guest-identity
              stdout: {contains: "uid=1000(arch)"}
              context: [runtime]
              command: id
            - check: command=cat /etc/os-release
              id: kv-guest-os-release
              stdout: {contains: "ID=arch"}
              context: [runtime]
              command: "cat /etc/os-release"
            - check: process=k3s-server
              id: kv-k3s-process
              context: [runtime]
              process:
                process: "k3s-server"
                running: true
            - check: port=6443
              id: kv-port-6443-listening
              context: [runtime]
              port:
                port: 6443
                listening: true
            - check: file=/etc/rancher/k3s/k3s.yaml
              id: kv-kubeconfig-file
              context: [runtime]
              file:
                file: /etc/rancher/k3s/k3s.yaml
                exists: true
            - check: k8s=nodes
              id: kv-k8s-nodes
              kube:
                method: nodes
                cluster: "vm-k3s-vm"
              context: [runtime]
            - check: k8s=wait-nodes
              id: kv-k8s-wait-nodes
              kube:
                method: "wait-nodes"
                cluster: "vm-k3s-vm"
                kube_count: 1
              timeout: "300s"
              context: [runtime]
            - check: k8s=pods
              id: kv-k8s-pods
              kube:
                method: pods
                cluster: "vm-k3s-vm"
                namespace: kube-system
              context: [runtime]
            - check: k8s=wait-ready
              id: kv-k8s-wait-ready
              kube:
                method: "wait-ready"
                cluster: "vm-k3s-vm"
                kube_kind: Deployment
                namespace: kube-system
                name: coredns
              timeout: "180s"
              context: [runtime]
            - check: k8s=addons
              id: kv-k8s-addons
              kube:
                method: addons
                cluster: "vm-k3s-vm"
              context: [runtime]
            - check: k8s=ingressclass
              id: kv-k8s-ingressclass-traefik
              kube:
                method: ingressclass
                cluster: "vm-k3s-vm"
              stdout: {contains: "traefik"}
              context: [runtime]
            - check: k8s=storageclass
              id: kv-k8s-storageclass-localpath
              kube:
                method: storageclass
                cluster: "vm-k3s-vm"
              stdout: {contains: "local-path"}
              context: [runtime]
            - check: k8s=raw — the raw escape hatch lists an arbitrary resource (namespaces)
              id: kv-k8s-raw
              kube:
                method: raw
                cluster: "vm-k3s-vm"
                kube_resource: namespaces
              context: [runtime]
              stdout:
                - contains: kube-system
            - check: k8s=service
              id: kv-k8s-service-kubernetes
              kube:
                method: service
                cluster: "vm-k3s-vm"
                namespace: default
                name: kubernetes
              context: [runtime]
            - check: command=${CHARLY_BIN} version
              id: kv-charly-version
              stdout: {matches: "[0-9]{4}\\.[0-9]+"}
              context: [runtime]
              command:
                command: "${CHARLY_BIN} version"
                in_container: false
            - agent-check: agent-check
              id: kv-matching
              context: [runtime]
            - check: command=charly status --json
              id: status-shows-vm
              stdout:
                - contains: '"kind": "vm"'
                - contains: k3s-vm
              context:
                - runtime
              command:
                command: ${CHARLY_BIN} status --json
                in_container: false
# check-k8s-deploy-app — the check-k8s-deploy bed's target:k8s WORKLOAD fixture.
# A minimal Fedora base box composed from LOCAL pure-rpm candies (supervisord +
# os-layer; no builder, no @github candy refs), so it builds from the root project —
# where the distro namespace boxes (fedora.web, …) do NOT, because their candies are
# @github refs the root resolver does not materialize. It is a disposable-bed FIXTURE
# (the minimal charly image the deploy:k8s substrate deploys), analogous to the
# kind:local check-*-app templates — not a production box, so it does not breach the
# "main owns no boxes" inversion (which concerns the shipped image catalog).
check-k8s-deploy-app:
    candy:
        version: 2026.180.1000
        base: quay.io/fedora/fedora:43
        description: |-
            Minimal Fedora base box — the check-k8s-deploy bed's target:k8s workload
            AND the check-sidecar-pod bed's pod workload. A small charly image whose
            ai.opencharly labels the deploy:k8s preresolver reads to generate the
            Kustomize tree. Composes check-keepalive (→ supervisord + a `keepalive`
            sleep-infinity program) + os-layer (local pure-rpm / coreutils candies, no
            builder/@github) so it builds from the root project. The keepalive program
            makes supervisord non-degenerate — it supervises a real program, so
            `charly service status` reports it (the K4 service-move coverage on
            check-sidecar-pod). The deployed pod is not asserted Ready (the locally-built
            image is absent from the disposable cluster's containerd); the k8s bed asserts
            only that the Deployment OBJECT landed — exactly the externalized `kubectl apply -k`.
        distro:
            - fedora:43
            - fedora
        candy:
            - check-keepalive
            - os-layer
# =============================================================================
# check-k8s-deploy — disposable proof of the EXTERNALIZED deploy:k8s SUBSTRATE
# (F1, candy/plugin-kube serving deploy:k8s beside verb:kube). A GROUP bed (the
# proven sibling-member shape — cf. box/fedora check-cross-pod-cdp) with two members
# brought up name-sorted: check-k8s-deploy-cluster (a libvirt k3s VM reusing the
# SAME k3s-vm entity + k3s-server candy check-k3s-vm proves) comes up FIRST and
# merges its kubeconfig to context vm-k3s-vm; check-k8s-deploy-workload (a
# `target: k8s` deploy of check-k8s-deploy-app) comes up SECOND — at bring-up the HOST
# preresolver (k8s_deploy_preresolve.go) reads the box Capabilities + the vm-k3s-vm
# cluster template and GENERATES an egress-validated Kustomize tree, then the
# out-of-process plugin applies it with `kubectl --context vm-k3s-vm apply -k`. The
# kube: checks under the cluster member (host-side probes; run after BOTH members are
# up) assert the workload Deployment OBJECT landed — the externalized apply ran
# end-to-end. (The workload POD is not asserted Ready: the locally-built box image is
# not in the VM's containerd, and image-into-cluster delivery is a separate concern
# the deploy substrate does not own; the Deployment-object proof IS the substrate.)
# =============================================================================
check-k8s-deploy:
    group:
        disposable: true
        lifecycle: dev
        description: >-
            R10 for the EXTERNALIZED deploy:k8s substrate (F1) — `target: k8s` resolves out-of-process to candy/plugin-kube's deploy:k8s provider over the E3b reverse channel, not a compiled-in DeployTarget. A group bed with two name-sorted sibling members: check-k8s-deploy-cluster (a disposable libvirt k3s VM, the shared k3s-vm + k3s-server stack, an auto-allocated host->guest 6443 forward) brings up a control plane and merges kubeconfig to context vm-k3s-vm; check-k8s-deploy-workload (a target:k8s deploy of check-k8s-deploy-app) is brought up second — its host preresolver generates an egress-validated Kustomize tree and its out-of-process plugin runs `kubectl --context vm-k3s-vm apply -k`. The kube: checks (wait-nodes + raw deployments GET + pods) prove the Deployment object landed on the cluster — the externalized substrate applied the workload end-to-end. The pod is not asserted Ready (the local box image is absent from the VM's containerd; image-into-cluster delivery is orthogonal to the substrate).
    # MEMBER 1 (name-sorts first) — the k3s control plane. bringUpMembers does vm
    # create + bundle add (k3s-server over SSH); K3sPostProvision merges the
    # kubeconfig to context vm-k3s-vm. The kube: assertion checks live HERE (this
    # member has a real SSH venue; the kube: verb dispatches host-side regardless,
    # and group check-live runs them only after BOTH members are up).
    check-k8s-deploy-cluster:
        vm:
            from: k3s-vm
            add_candy:
                - k3s-server
            env:
                # Host port auto-allocated (port_forwards: ["auto:6443"]); k3s_post
                # rewrites the kubeconfig to the allocated port from vm_state
                # automatically — no hardcoded K3S_KUBECONFIG_SERVER (cf. check-k3s-vm).
                K3S_SERVER_HOSTNAME: 127.0.0.1
            install_opts:
                with_service: true
                allow_repo_changes: true
                skip_incompatible: true
                verify: true
            plan:
                - check: the k3s control plane reports a Ready node before the workload assertion
                  id: kd-wait-nodes
                  kube:
                    method: wait-nodes
                    cluster: "vm-k3s-vm"
                    kube_count: 1
                  timeout: "300s"
                  stdout: {contains: "Ready"}
                  context: [runtime]
                - check: the externalized deploy:k8s substrate applied the workload Deployment object to the cluster
                  id: kd-deployment-landed
                  kube:
                    method: raw
                    cluster: "vm-k3s-vm"
                    kube_resource: deployments
                    kube_group: apps
                    kube_version: v1
                    namespace: default
                    name: check-k8s-deploy-workload
                  stdout: {contains: "check-k8s-deploy-workload"}
                  context: [runtime]
                - check: the applied Deployment's controller scheduled the workload pod onto the cluster
                  id: kd-pod-scheduled
                  kube:
                    method: pods
                    cluster: "vm-k3s-vm"
                    namespace: default
                  stdout: {contains: "check-k8s-deploy-workload"}
                  context: [runtime]
    # MEMBER 2 (name-sorts second) — the target:k8s workload. check-k8s-deploy-app is built
    # locally by the group bed's member-build arm (box build check-k8s-deploy-app), so the host
    # preresolver's ExtractMetadata reads its OCI labels. `from: vm-k3s-vm` selects
    # the kind:k8s cluster template (kubeconfig_context: vm-k3s-vm). Deploy-only (no
    # own checks — it is an instrument; the cluster member's kube: checks assert it).
    check-k8s-deploy-workload:
        k8s:
            image: check-k8s-deploy-app
            from: vm-k3s-vm
# =============================================================================
# check-sidecar-pod — disposable R10 for the sidecar de-type (Cutover D). The
# sidecar KIND's business logic (embedded<project<deploy template MERGE, CLI
# env-flag ROUTING, and volume/secret-name + env_from RESOLUTION) moved out of the
# kernel into candy/plugin-sidecar's OpResolve leg; the kernel stores sidecar defs
# OPAQUELY (map[string]json.RawMessage). This bed deploys the minimal fedora
# check-k8s-deploy-app pod with the project `mypause` sidecar attached: `charly
# config` resolves the sidecar THROUGH the plugin (providerRegistry.ResolveKind →
# Invoke(OpResolve)) and generates the sidecar quadlet. If the de-type broke
# resolution, config errors and the bed never reaches steady state; the pause
# sidecar (a tiny always-running infra image) proves the resolved quadlet deployed
# as a live pod member beside the app.
# =============================================================================
mypause:
    sidecar:
        description: a trivial always-running sidecar for the sidecar de-type R10 bed
        image: registry.k8s.io/pause:3.9
check-sidecar-pod:
    pod:
        image: check-k8s-deploy-app
        disposable: true
        lifecycle: dev
        description: >-
            R10 for the sidecar de-type (Cutover D) — candy/plugin-sidecar's OpResolve
            owns all sidecar business logic; the kernel stores sidecar defs opaquely.
            Deploys the minimal check-k8s-deploy-app pod with the `mypause` sidecar
            attached: reaching steady state proves the plugin resolved + generated the
            sidecar quadlet end-to-end (a broken de-type fails `charly config` at deploy).
        sidecar:
            mypause: {}
        plan:
            - check: command=charly status --json
              id: sidecar-pod-running
              stdout:
                - contains: '"kind": "pod"'
                - contains: check-sidecar-pod
              context:
                - runtime
              command:
                command: ${CHARLY_BIN} status --json
                in_container: false
            - check: charly service status reprints the in-container supervisorctl output — the keepalive program RUNNING — proving the K4 service move (charly service → LifecycleTarget.Shell → the pod plugin's OpShell captured exec) carries the container command's output back through the host. A swallowing capture bug yields EMPTY output and FAILS this step; the host-resolved `<engine> exec <ctr> supervisorctl status` argv is executed IN the pod plugin over the served executor, not by core.
              id: service-status-output-present
              exit_status: 0
              stdout:
                - contains: keepalive
                - contains: RUNNING
              context:
                - runtime
              command:
                command: ${CHARLY_BIN} service status check-sidecar-pod
                in_container: false
            - run: stop the pod through the K4 deep-body STOP path (charly stop → LifecycleTarget.Stop → the pod plugin's podStop over F6, with the arbiter release bracket)
              exit_status: 0
              context:
                - runtime
              command:
                command: ${CHARLY_BIN} stop check-sidecar-pod
                in_container: false
            - run: start the pod again through the K4 deep-body START path (charly start → LifecycleTarget.Start → the pod plugin's podStart over F6, with the arbiter acquire bracket)
              exit_status: 0
              context:
                - runtime
              command:
                command: ${CHARLY_BIN} start check-sidecar-pod
                in_container: false
            - check: after the explicit stop→start cycle the pod is running again — the BOTH-DIRECTIONS coverage that would FAIL without the K4 deep-body start/stop move (a broken lifecycle dispatch leaves the pod down after stop, or never restarts it)
              id: sidecar-pod-restarted
              exit_status: 0
              stdout:
                - contains: '"kind": "pod"'
                - contains: check-sidecar-pod
              context:
                - runtime
              command:
                command: ${CHARLY_BIN} status --json
                in_container: false
            - check: charly shell -c runs a ONE-SHOT non-interactive command through the consolidated pod-lifecycle-dispatch seam (charly shell → dispatchLifecycleTarget("shell",…) → LifecycleTarget.Attach, host_build_pod_lifecycle_dispatch.go's hostBuildPodShell) — the Cutover B unit 2 round-trip's shell coverage. A broken consolidation either fails the exec or drops the echoed marker from stdout.
              id: shell-oneshot-roundtrip
              exit_status: 0
              stdout:
                - contains: shell-roundtrip-ok
              context:
                - runtime
              command:
                command: ${CHARLY_BIN} shell check-sidecar-pod -c "echo shell-roundtrip-ok"
                in_container: false
            - run: charly logs (bounded, non-follow) through the consolidated seam (charly logs → dispatchLifecycleTarget("logs",…) → LifecycleTarget.Logs, hostBuildPodLogs) — proves the logs verb still dispatches and returns after the file consolidation.
              exit_status: 0
              context:
                - runtime
              command:
                command: ${CHARLY_BIN} logs check-sidecar-pod
                in_container: false
            - run: charly logs -f (follow mode) BOUNDED by a shell-level `timeout` wrapper — proves follow-mode streaming through the SAME consolidated seam terminates cleanly under an external cutoff rather than hanging the bed run forever. Accepts ONLY exit 0 (the process exited on its own before the cutoff) or 124 (timeout(1)'s own signal-kill code, the expected/intended path) — any OTHER exit (a crash, a command-not-found, an unrelated failure) still FAILS the step; this is deliberately narrower than a bare `|| true`, which would mask every failure, not just timeout's. The step-level timeout field below (20 seconds) is a last-resort framework-side backstop.
              exit_status: 0
              timeout: 20s
              context:
                - runtime
              command:
                command: timeout 5 ${CHARLY_BIN} logs check-sidecar-pod -f; case $? in 0|124) true;; *) false;; esac
                in_container: false
            - run: charly update rebuilds/redeploys the artifact through dispatchByDeployTarget (update_deploy_dispatch.go, UNCHANGED by this cutover — reused as-is by the new consolidated seam's hostBuildPodUpdate) — proves the update path still works after the file consolidation.
              exit_status: 0
              context:
                - runtime
              command:
                command: ${CHARLY_BIN} update check-sidecar-pod
                in_container: false
            - run: charly remove --keep-deploy tears the pod down through candy/plugin-pod's FULLY-ported remove orchestration (RemoveCmd.Run() → remove_tunnel.go's tunnel-stop + remove_orchestration.go's runPodRemove, reaching the host only for the arbiter-release bracket, the credential-backed hook env, and the deploy-entry cleanup's registry-resugar) — keeps the charly.yml deploy entry so the very next step can recreate it, proving remove's fully-relocated orchestration still works end-to-end.
              exit_status: 0
              context:
                - runtime
              command:
                command: ${CHARLY_BIN} remove check-sidecar-pod --keep-deploy
                in_container: false
            - check: after remove→start the pod is running again — the round-trip's final assertion, proving the FULL consolidated pod-lifecycle-dispatch family (start/stop/shell/logs/update/remove/service) composes end-to-end, not just each verb in isolation.
              id: sidecar-pod-roundtrip-final
              exit_status: 0
              stdout:
                - contains: '"kind": "pod"'
                - contains: check-sidecar-pod
              context:
                - runtime
              command:
                command: ${CHARLY_BIN} start check-sidecar-pod && ${CHARLY_BIN} status --json
                in_container: false
# check-local-vm — GUEST-AS-HOST (the host-invocable OUTER vm bed; the INNER guest bed it
# runs stays named `check-local`, a top-level host:local deploy in the pruned guest project).
# Formerly a top-level `host: local` bed that dropped /etc/check-local-marker + /tmp markers
# on the OPERATOR's workstation. It is now a
# disposable `vm:` bed: it boots eval-host-vm, welds charly into the guest
# (add_candy:[charly]), rsyncs the PRUNED check-local closure + sdk/ into the guest
# (check/eval-host-project/), then runs `charly --host charly-check-local-vm check run
# check-local` so the GUEST's charly applies check-local-layer to its OWN `host: local`
# venue via the guest ShellExecutor + HostDeployTarget. This PRESERVES the kind:local
# ShellExecutor coverage (a nest-as-member move would drop it to NestedExecutor) while
# confining every /etc + /tmp side-effect to the disposable guest. The delivery +
# `charly --host` steps run HOST-SIDE (in_container: false; cwd = this project per
# main.go:734); the guest resolves the delivered project via CHARLY_PROJECT_DIR
# (/etc/environment, pam_env). The guest builds the 2 out-of-tree plugins check-local
# composes (deploy:local + examplestep) against the delivered sdk/, fetching their module
# deps over the guest's outbound network. LONG bed (VM + nested check-run) — persistent-
# session-owned R10.
check-local-vm:
    vm:
        from: eval-host-vm
        disposable: true
        lifecycle: dev
        description: >-
            Guest-as-host proof of the kind:local layer-application path via ShellExecutor +
            HostDeployTarget, run INSIDE the disposable eval-host-vm guest (off the operator's
            workstation). Boots eval-host-vm, welds charly (add_candy:[charly] → opencharly-git),
            rsyncs the pruned check-local closure (check/eval-host-project/charly.yml + sdk/ +
            candy/{check-local-layer,examplestep-deploy-consumer,plugin-example-step,plugin-deploy-local})
            into the guest, then runs `charly --host charly-check-local-vm check run check-local`: the
            guest charly resolves the delivered project via CHARLY_PROJECT_DIR and applies
            check-local-layer to its OWN host: local (guest ShellExecutor + HostDeployTarget),
            dropping /etc/check-local-marker + the examplestep /tmp markers in the GUEST. ALSO the
            witness for the STEP DEPLOY-EXECUTE leg of external plugin execution (ExternalPluginStep
            → InvokeWithExecutor(OpExecute) over the E3b reverse channel): the guest builds the
            out-of-tree examplestep + deploy:local plugins against the delivered sdk/. exit 0 from
            the nested run proves the kind:local path end-to-end; every side-effect is confined to
            the disposable guest.
        add_candy:
            # Welded charly (opencharly-git) so the guest has `charly` on PATH + the 48
            # compiled_plugins; the localpkg build runs host-side (makepkg) + pacman -U into
            # the guest — the same path check-charly-vm proves.
            - charly
        install_opts:
            allow_repo_changes: true # pacman -U auto-resolves opencharly-git repo deps in the guest
            allow_root_tasks: true
        plan:
            - check: deliver the pruned check-local closure + sdk/ into the eval-host-vm guest project dir (host-side rsync over the managed charly-check-local-vm ssh alias — the domain is named after this DEPLOY, not the eval-host-vm entity; cwd = this project per main.go:734)
              id: guest-project-delivered
              context:
                - runtime
              exit_status: 0
              command:
                in_container: false
                command: |
                    set -euo pipefail
                    ssh charly-check-local-vm 'mkdir -p /home/arch/eval-project/candy'
                    rsync -a ./check/eval-host-project/charly.yml charly-check-local-vm:/home/arch/eval-project/charly.yml
                    rsync -a ./sdk/ charly-check-local-vm:/home/arch/eval-project/sdk/
                    rsync -a ./candy/check-local-layer ./candy/examplestep-deploy-consumer ./candy/plugin-example-step ./candy/plugin-deploy-local charly-check-local-vm:/home/arch/eval-project/candy/
            - check: run check-local host:local INSIDE the guest via `charly --host` — the guest charly resolves the delivered project via CHARLY_PROJECT_DIR and applies check-local-layer to its OWN host:local (guest ShellExecutor + HostDeployTarget), building the 2 out-of-tree plugins in-guest; exit 0 proves the kind:local path end-to-end off the operator's workstation
              id: guest-as-host-check-local
              context:
                - runtime
              exit_status: 0
              command:
                in_container: false
                command: ${CHARLY_BIN} --host charly-check-local-vm check run check-local
# =============================================================================
# check-builder-vm — dedicated builder-DEPLOY-leg bed (added with the C1.3 Builder
# build-emit externalization), MOVED off the operator's workstation into the disposable
# eval VM. Before this bed no disposable deploy applied a built-in pixi/npm/cargo/aur
# detection-builder candy to a local:/vm: venue, so runVenueBuilderStep (the host-engine
# builder deploy leg → runVenueHomeArtifactBuilder) was only TRANSITIVELY exercised. The
# check-builder-local-app template (composing check-builder-npm, a package.json declaring
# the tiny zero-dep is-number) is NESTED under a `vm: {from: eval-vm}` node — tree position,
# no `host:` field — so it deploys INTO the guest via kit.NestedExecutor. runVenueBuilderStep
# still compiles the npm global prefix in the fedora.fedora-builder image HOST-SIDE (the
# host-engine leg over RunHostStep) and ships ~/.npm-global onto the GUEST venue; the marker
# check asserts is-number under ~/.npm-global in the GUEST — so the ~/.npm-global write never
# touches the operator's home. Precedent for the vm-bed-with-nested-local-member shape:
# box/arch check-arch-vm → arch-host. Shares the eval-vm DISK BASE with check-group /
# check-substrate / check-structkind, but each gets its OWN domain (charly-check-builder-vm here) +
# per-domain disk overlay + host ssh port, so these long vm beds run CONCURRENTLY (collision-free by
# construction — the domain is keyed by the deploy, not the entity). The C1.3 pod-overlay BUILD-emit is
# proven separately by the real-chain unit tests (TestOCITargetEmitBuilder{Inline,MultiStage}ViaPlugin)
# + the live check-addcandy-pod pod-overlay dispatch gate; this bed is the complementary
# builder-DEPLOY-leg gate.
# =============================================================================
check-builder-vm:
    vm:
        from: eval-vm
        disposable: true
        lifecycle: dev
        description: >-
            Sole proof of the builder DEPLOY leg (runVenueBuilderStep → runVenueHomeArtifactBuilder) applying a built-in npm detection-builder candy to a venue, run INSIDE the disposable eval VM (off the operator's workstation). Nests check-builder-local-app (composing check-builder-npm, a package.json declaring the tiny zero-dep is-number) under the vm node via kit.NestedExecutor: at deploy charly compiles the npm global prefix in the fedora.fedora-builder image HOST-SIDE (the host-engine builder leg over RunHostStep) and ships ~/.npm-global onto the GUEST venue; the nested member's marker check asserts ~/.npm-global/lib/node_modules/is-number in the GUEST home, never the operator's. The builder image is pinned via the member's install_opts.builder_image (a kind:local template has no base-distro builder wiring). The C1.3 pod-overlay BUILD-emit is proven separately by the real-chain unit tests + the live check-addcandy-pod pod-overlay dispatch.
    check-builder-member:
        local:
            # NESTED under the vm node (tree position) → deploys INTO the eval VM guest via
            # kit.NestedExecutor. No `host:` field: the venue comes from the parent. The builder
            # DEPLOY leg compiles host-side and ships ~/.npm-global onto the GUEST venue.
            from: check-builder-local-app
            install_opts:
                builder_image: fedora.fedora-builder
                allow_root_tasks: true
            plan:
                - check: the npm builder deployed the is-number artifact into ~/.npm-global INSIDE the eval VM guest (proves the builder DEPLOY leg runVenueBuilderStep → runVenueHomeArtifactBuilder applied a detection-builder candy end-to-end to a nested guest venue)
                  id: builder-artifact-present-in-guest
                  context:
                    - runtime
                  command:
                    command: 'test -f "$HOME/.npm-global/lib/node_modules/is-number/package.json"'
# =============================================================================
# check-group — R10 witness for the EXTERNALIZED `group` structural kind (C2-group).
# `group:` is no longer a compiled-in core KindProvider; it is served by the
# compiled-in structural plugin candy/plugin-group (kind:group, Structural:true).
# A REAL `group:` node here therefore exercises the full path: the loader recognizes
# `group` via the compiled-in provider, runPluginKind PRE-DECODES the authored member
# (buildResourceMemberChildren — the core recursion) + threads it to plugin-group's
# OpLoad via op.Env (F5 authored-member input-threading), and plugin-group attaches it
# to a targetless spec.Deploy the host folds into uf.Bundle — byte-equivalent to the
# former builtin groupKind. The reconstructed member (check-group-member, a kind:local
# deploy of check-group-app) is deployed INSIDE the disposable eval VM, and the marker
# check authored on the member's OWN plan asserts /etc/check-group-marker in the GUEST —
# proving a real group decode deploys end-to-end without mutating the host.
# =============================================================================
check-group-app:
    local:
        description: |-
            Minimal kind:local template for the check-group member — composes check-group-layer
            (drops /etc/check-group-marker) so the group member has a deterministic,
            collision-free deploy effect. The member is nested under check-group-vm, so this
            applies INSIDE the disposable eval VM over kit.NestedExecutor and the marker lands
            in the guest, never on the operator's host.
        candy:
            - check-group-layer
check-group:
    group:
        disposable: true
        lifecycle: dev
        description: >-
            Sole R10 witness of the externalized `group` structural kind (candy/plugin-group, C2-group): a REAL targetless `group:` deploy group decoded out of core through the compiled-in plugin-group over the F5 authored-member input-threading foundation. The authored member (check-group-member) is pre-decoded host-side and threaded to plugin-group via op.Env; the plugin attaches it to a targetless spec.Deploy the host folds into uf.Bundle. bringUpMembers deploys the member, and the marker check authored on the MEMBER'S OWN node plan asserts /etc/check-group-marker — proving a real group: decode reconstructs + deploys its authored member end-to-end, identical to the former builtin. The check must live on the member's node plan: a composed candy's plan: never reaches a deploy-scope check runner for a non-image deploy, so a check authored only in check-group-layer would silently never run (this bed printed "No plan steps to run." and asserted NOTHING before that fix). The member is a kind:local deploy of check-group-app NESTED UNDER the check-group-vm node, so it lands INSIDE the disposable eval VM via kit.NestedExecutor (tree position, no `host:` field) and the marker is written on the GUEST filesystem — never the operator's workstation. NOTE: a nested child runs on NestedExecutor over the guest venue, NOT ShellExecutor; the host-side ShellExecutor + HostDeployTarget arm is witnessed by check-local running INSIDE the guest-as-host VM (the check-local-vm bed) — the guest's charly applies check-local to the GUEST's OWN host:local via the guest ShellExecutor + HostDeployTarget, still ShellExecutor, just off the operator's workstation (see /charly-core:deploy "Deploy-into nesting").
    check-group-vm:
        vm:
            from: eval-vm
        # NESTED under the vm node (tree position) => the local: deploy lands INSIDE
        # the guest via kit.NestedExecutor. No `host:` field: the venue comes from the
        # parent. Precedent: box/arch check-arch-vm -> arch-host.
        check-group-member:
            local:
                from: check-group-app
                # The marker check is authored HERE, on the deploy node's OWN plan. A composed
                # candy's `plan:` is NEVER surfaced to a deploy-scope check runner for a non-image
                # deploy (checkLocalDeployScope sources only the template's plan, the node's plan,
                # and the folded entry). The check that lived only in check-group-layer therefore
                # never executed and this bed passed asserting nothing. hoistVenueSubtree lifts the
                # step to the group root with venue `check-group-vm.check-group-member` — the guest.
                plan:
                    - check: command=test -f /etc/check-group-marker && echo GROUP-MEMBER-DEPLOY-OK
                      id: cg-member-marker-in-guest
                      description: the group's authored member deployed INTO the eval VM and its layer wrote /etc/check-group-marker on the GUEST filesystem
                      stdout:
                          - contains: GROUP-MEMBER-DEPLOY-OK
                      context:
                          - runtime
                      command:
                          command: "test -f /etc/check-group-marker && echo GROUP-MEMBER-DEPLOY-OK"
# =============================================================================
# check-structkind — R10 witness for F5 authored-member INPUT-threading, run INSIDE
# the disposable eval VM (moved off the operator host per the eval-bed hygiene directive).
# The TOP node is an EXTERNAL STRUCTURAL plugin kind (examplestructkind, out-of-process,
# NOT compiled in): its authored resource-MEMBER child is pre-decoded HOST-SIDE (the core
# buildBundleNode recursion) and threaded to the plugin's OpLoad via op.Env; the plugin
# ATTACHES it to its spec.Deploy reply so the host folds a COMPLETE Bundle (with the AUTHORED
# member) into uf.Bundle — byte-equivalent to a builtin group (proven hermetically by

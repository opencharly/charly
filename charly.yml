            checksum:
                type: sha256
                value: a99844dda491606f81f463ce96851ae03d90ca8fa727671cac2da86a07a7cd61
            base_user: arch
        backend: libvirt
        disk_size: 20G
        ram: 4G
        cpu: 2
        machine: q35
        firmware: bios
        ssh:
            port_auto: true
            key_source: generate
        cloud_init:
            timezone: UTC
            package:

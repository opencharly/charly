                  command:
                    command: |-
                        python3 -c '
                        import asyncio
                        async def main():
                            try:
                                import websockets
                            except ImportError:
                                print("websockets not installed; skipping ws probe"); return
                            try:
                                ws = await asyncio.wait_for(
                                    websockets.connect("ws://127.0.0.1:8888/api/yjs/json:notebook:mcp-D.ipynb"),
                                    5,
                                )
                                await asyncio.sleep(1)
                                await ws.close()
                                print("ws-probe-ok")
                            except Exception as e:

# =================================================================
# check-udev-local — R10 witness for the externalized `charly udev` COMMAND
# (candy/plugin-udev, command:udev) — the first externalizable-command precedent.
# A disposable kind:local deploy on host: local that runs the two GPU-less,
# deterministic udev sub-commands host-side:
#   - `charly udev generate` → asserts the exact 99-charly-container-access rule lines on stdout
#   - `charly udev status`   → exits 0 (graceful device + rule report on a GPU-less host)
# The host `charly` resolves the `udev` word via the discovered candy/plugin-udev
# prescan and syscall.Exec's the plugin binary (host-built, or baked at
# /usr/lib/charly/plugins by pkg/arch). install/remove (sudo + udevadm, host-mutating)
# stay out of the bed — the Go e2e (TestExternalCommandExecPlan_Udev) + plugin-udev's
# build-context ADE check cover the dispatch + module-builds legs.
# =================================================================
check-udev-app:
    local:
        description: |-
            Minimal kind:local template for the check-udev-local bed — composes the
            command-only candy/plugin-udev (no install content) so the bed exercises the
            externalized `charly udev` CLI host-side.
        candy:
            - plugin-udev
check-udev-local:
    local:
        from: check-udev-app
        host: local
        disposable: true
        lifecycle: dev
        description: >-
            Sole proof of the externalized `charly udev` COMMAND (candy/plugin-udev, command:udev), the first externalizable-command precedent in the core-externalization program. A disposable kind:local deploy on host: local runs the two GPU-less udev sub-commands host-side: `charly udev generate` asserts the exact 99-charly-container-access rule lines on stdout (the host charly resolves the `udev` word via the discovered candy/plugin-udev prescan and syscall.Exec's the plugin binary), and `charly udev status` exits 0 with a graceful device + rule report on a GPU-less host.
        plan:
            - check: command=charly udev generate prints the exact 99-charly-container-access rule lines
              id: udev-generate-rules
              stdout:
                - contains: 'SUBSYSTEM=="drm", KERNEL=="card[0-9]*", GROUP="render", MODE="0660"'
                - contains: 'SUBSYSTEM=="kfd", KERNEL=="kfd", GROUP="render", MODE="0660"'
                - contains: 'SUBSYSTEM=="vfio", GROUP="kvm", MODE="0660"'
              context:
                - runtime
              command:
                command: ${CHARLY_BIN} udev generate
                in_container: false
            - check: command=charly udev status exits 0 and reports device + rule status (GPU-less graceful)
              id: udev-status-runs
              exit_status: 0
              stdout:
                - contains: 'GPU Devices:'
                - contains: 'Udev Rules:'
              context:
                - runtime
              command:
                command: ${CHARLY_BIN} udev status
                in_container: false
# =================================================================
# check-preempt-local — R10 witness for the externalized `charly preempt` COMMAND
# (candy/plugin-preempt, command:preempt) — COMPILED-IN, owns the CLI + the lease-table formatting,
# and reaches its peer verb:arbiter DIRECTLY via InvokeProvider (no hidden core-command forward, no
# in-core proxy hop). A disposable kind:local deploy on host: local runs the GPU-less, deterministic
# preempt CLI host-side:
#   - `charly preempt status` → exits 0 and names no lease owned by THIS bed (a sibling bed's
#     transient lease is legitimate under a parallel roster) — the compiled-in command's
#     Invoke(OpRun) calls InvokeProvider(verb:arbiter, status) over the in-proc reverse channel
#     + the plugin renders the lease table.
# The live `charly preempt restore` step is INTENTIONALLY NOT run here (eval-bed hygiene): reconcileStranded
# reads the operator's GLOBAL lease ledger (~/.local/share/charly/preemption/leases.yml) and would restart a
# genuinely-stranded operator holder (e.g. a preempted GPU-VM) — a side-effect on operator infrastructure an
# eval bed must not have (it is a no-op on a clean host + provably restorative-only, but global-scope). Its
# reconcile→gather/start path stays covered by the Go e2e (TestArbiter_ReconcileStrandedRestores +
# TestArbiterExternalizedDispatch_AcquirePersistsAndSurfaces) + the check-preempt-arbiter-pod bed; the kept
# `status` step exercises the same command:preempt → InvokeProvider(verb:arbiter) dispatch.
# =================================================================
check-preempt-app:
    local:
        description: |-
            Minimal kind:local template for the check-preempt-local bed — composes the
            command-only candy/plugin-preempt (no install content) so the bed exercises the
            externalized `charly preempt` CLI host-side.
        candy:
            - plugin-preempt
check-preempt-local:
    local:
        from: check-preempt-app
        host: local
        disposable: true
        lifecycle: dev
        description: >-
            Sole proof of the externalized `charly preempt` COMMAND (candy/plugin-preempt, command:preempt), COMPILED-IN and owning the CLI + lease-table formatting. A disposable kind:local deploy on host: local runs `charly preempt status` host-side: the compiled-in command's Invoke(OpRun) reaches its peer verb:arbiter DIRECTLY via InvokeProvider over the in-proc reverse channel (the arbiter's host dependencies flow over the always-served HostArbiter leg) — no hidden core-command forward, no in-core proxy hop. status exits 0 with a well-formed lease table naming no lease owned by THIS bed (sibling beds' transient leases are legitimate under a parallel roster) — proving the externalized command + the InvokeProvider peer-dispatch end-to-end. The live `restore`/reconcile step is intentionally omitted (it reads the operator's global lease ledger, so an eval bed must not run it); its reconcile→gather/start path stays covered by the Go e2e (TestArbiter_ReconcileStrandedRestores + TestArbiterExternalizedDispatch_AcquirePersistsAndSurfaces) + the check-preempt-arbiter-pod bed.
        plan:
            - check: command=charly preempt status exits 0 and names no lease owned by THIS bed — bed-owned scoping, because a concurrent sibling bed's transient lease is legitimate (a global no-leases assertion can never hold under a parallel roster)
              id: preempt-status-runs
              exit_status: 0
              stdout:
                - not_matches: '(^|[[:space:]])check-preempt-local([[:space:]]|$)'
              context:
                - runtime
              command:
                command: ${CHARLY_BIN} preempt status
                in_container: false

#     RAW FACTS ONLY (no report logic in core). The output is asserted to contain the stable
#     "Container Engine" group header (always printed), proving the externalized command +
#     the hostprobe seam end-to-end. `charly doctor` exits 0 whenever a
#     container engine (podman/docker) is present — the sole required group — which holds on any
#     charly host, so the bed's exit-0 assertion is deterministic.
# =================================================================
check-doctor-app:
    local:
        description: |-
            Minimal kind:local template for the check-doctor-local bed — composes the
            command-only candy/plugin-doctor (no install content) so the bed exercises the

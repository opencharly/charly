version: 2026.186.2323
# Canonical repo identity. After the 2026-06 box inversion main imports the three
# active distro submodules (arch / cachyos / fedora) ONE-DIRECTIONALLY to reference
# their relocated boxes; the submodules no longer import main as a namespace (they
# reach main's shared candies via @github refs), so the former mutual cycle is
# dissolved. See /charly-internals:go.
repo: github.com/opencharly/charly
import:
    # After the 2026-06 box inversion main owns NO boxes — it imports the three
    # active distro submodules ONE-DIRECTIONALLY to reference their relocated boxes
    # in the inline check/vm/local/k8s/android orchestration below (e.g. the
    # check-cross-* mechanism beds reference `fedora.web` / `fedora.chrome-headless`).
    # Each submodule owns its own base stack: arch + fedora are self-contained
    # (import: []) and cachyos imports the `arch` namespace; none imports main back
    # (they reach main's shared candies via @github refs), so the former
    # main↔cachyos / main↔fedora mutual cycles are dissolved.
    - arch: '@github.com/opencharly/distro-arch:v2026.183.1359'
    - cachyos: '@github.com/opencharly/distro-cachyos:v2026.183.1359'
    - fedora: '@github.com/opencharly/distro-fedora:v2026.183.1359'
# Main owns NO boxes after the 2026-06 box inversion — only the shared candy
# library + the inline check/vm/local/k8s orchestration. Discover candies only.
discover:
    - path: candy
      recursive: true
defaults:
    platform:
        - linux/amd64
    tag: auto
    registry: ghcr.io/opencharly
    build:
        - rpm
    merge:
        auto: false
        max_mb: 128
    # No defaults.builder: main owns no boxes after the box inversion, so there is
    # nothing to build multi-stage formats for. Each submodule box declares its own
    # builder map (arch.arch-builder / fedora.fedora-builder / cachyos via arch).
    # Build-speed tunables (project-wide). Precedence: CLI flag / env wins,
    # then these defaults, then a built-in fallback. See /charly-build:build.
    jobs: 4 # outer: concurrent IMAGE builds per DAG level (--jobs / CHARLY_BUILD_JOBS)
    podman_jobs: 0 # inner: stages per `podman build`; 0 = auto = min(NCPU, podman_jobs_cap)
    podman_jobs_cap: 8 # ceiling for the auto calc — proven safe on podman 5.8.2 (20-run race gate)
    # Heavy directories never COPYed by any Containerfile — merged into the
    # generated .containerignore/.dockerignore on top of the built-in baseline
    # (.git, bin, charly, *.md, editor/python/node cache-bust globs).
    context_ignore:
        - box
        - .check
        - output
        - dist
        - pkg
        - tests
        - .regression-snapshot
    cache: image # default build cache mode (image local read / registry read+write)
    # Reusable-artifact retention (auto-pruned at creation; also via `charly clean`).
    # 0 disables. See /charly-core:clean.
    keep_images: 3 # newest CalVer tags to keep per image after `charly box build`
    keep_check_runs: 3 # newest run dirs to keep per bed/score after `charly check run`
vm:
    vm:
        source:
            kind: cloud_image
            url: https://download.fedoraproject.org/pub/fedora/linux/releases/41/Cloud/x86_64/images/Fedora-Cloud-Base-Generic-41-1.4.x86_64.qcow2
            checksum:
                type: sha256
                value: 6205ae0c524b4d1816dbd3573ce29b5c44ed26c9fbc874fbe48c41c89dd0bac2
            base_user: fedora
        disk_size: 6G
        ram: 2G
        cpu: 2
        firmware: bios
        network:
            mode: user
        ssh:
            user: fedora
            port_auto: true
            key_source: generate
        cloud_init:
            package:
                - qemu-guest-agent
                - curl
            runcmd:
                - "setenforce 0 || true"
                - "sed -i 's/^SELINUX=.*/SELINUX=permissive/' /etc/selinux/config || true"
                - "echo '10.89.0.1 charly-web' >> /etc/hosts"
                - "systemctl enable --now qemu-guest-agent"
                - "for c in 21 33 46 82 124 196 208 220 1 5; do printf '\\033[48;5;%dm                    \\033[0m\\n' $c >> /dev/tty1; done || true"
vm-libvirt:
    vm: {libvirt: {devices: {channels: [{type: unix, name: org.qemu.guest_agent.0, path: '{{.VmStateDir}}/qga.sock'}], graphics: [{type: spice, autoport: "yes", listen: 127.0.0.1}], video: [{model: virtio, heads: 1, accel3d: false}]}}}
k3s-vm:
    vm:
        source:
            kind: cloud_image
            url: https://fastly.mirror.pkgbuild.com/images/latest/Arch-Linux-x86_64-cloudimg.qcow2
            checksum:
                type: sha256
            base_user: arch
        backend: libvirt
        disk_size: 20G
        ram: 4G
        cpu: 2
        machine: q35
        firmware: bios
        network:
            mode: user
            # `port_forwards` (plural) is the canonical key — VmNetwork.PortForwards
            # (yaml:"port_forwards"), a kept-plural key in the field-singular cutover.
            # The original bed used the singular `port_forward:`, which YAML silently
            # dropped → no host:16443 forward → the k8s probes hit
            # `dial 127.0.0.1:16443: connection refused`.
            port_forwards:
                - "16443:6443"
        ssh:
            # port_auto auto-allocates the host SSH port at create (was a fixed
            # 2225 chosen to dodge collisions — port_auto does that automatically).
            # This bed is also the R10 for the ssh.port_auto feature: the entire
            # k3s deploy connects over SSH on the auto-allocated port.
            port_auto: true
            key_source: generate
        cloud_init:
            timezone: UTC
            package:
                - sudo
            charly_install:
                strategy: auto
        libvirt:
            devices:
                rng:
                    - model: virtio
                      backend: /dev/urandom
                memballoon:
                    model: virtio
# Arch Cloud VM backing check-charly-vm — the pac localpkg deploy witness. Plain
# disposable VM (no port forwards / k3s); charly is installed onto it by the bed's
# localpkg deploy, so the VM itself carries no opencharly layers.
# eval-vm — the disposable EVAL VM that every host-mutating `local:` check bed
# nests into. A `local:` node placed UNDER this vm node deploys INTO the guest via
# kit.NestedExecutor (tree position; the child carries no `host:` field), so the bed's
# candies write inside the guest and never touch the operator's workstation.
# See /charly-core:deploy "Deploy-into nesting"; the shipped precedent is box/arch's
# check-arch-vm -> arch-host. It owns its OWN domain (charly-eval-vm) — never reuse
# charly-vm, which check-charly-vm owns, or the two beds collide on one libvirt domain.
eval-vm:
    vm:
        source:
            kind: cloud_image
            url: https://fastly.mirror.pkgbuild.com/images/latest/Arch-Linux-x86_64-cloudimg.qcow2
            checksum:
                type: sha256
            base_user: arch
        backend: libvirt
        disk_size: 20G
        ram: 4G
        cpu: 2
        machine: q35
        firmware: bios
        ssh:
            port_auto: true
            key_source: generate
        cloud_init:
            timezone: UTC
            package:
                - sudo

charly-vm:
    vm:
        source:
            kind: cloud_image
            url: https://fastly.mirror.pkgbuild.com/images/latest/Arch-Linux-x86_64-cloudimg.qcow2
            checksum:
                type: sha256
            base_user: arch
        backend: libvirt
        disk_size: 20G
        ram: 4G
        cpu: 2
        machine: q35
        firmware: bios
        ssh:
            port_auto: true
            key_source: generate
        cloud_init:
            timezone: UTC
            package:
                - sudo
vm-k3s-vm:
    k8s:
        box: ""
        kubeconfig_context: vm-k3s-vm
claude:
    agent:
        description: Anthropic Claude Code CLI — autonomous coding agent.
        # --verbose + --output-format stream-json emit one JSON object per
        # message in the agent loop (system / assistant / user / tool_use /
        # tool_result / result). The harness parses each line, embeds it
        # into result-{calver}.yml under iteration[].runner_event, and tees
        # the raw NDJSON to .harness/<score>/runs/<run-id>/iter<k>/runner.ndjson
        # for byte-exact debugging. See /charly-check:check for the score
        # runner and its stream-json wire format.
        command: [claude, -p, --verbose, --output-format, stream-json, --dangerously-skip-permissions, "${PROMPT}"]
        output_format: stream-json
        version_command: [claude, --version]
        credential:
            - {src: ~/.claude/.credentials.json, dst: ~/.claude/.credentials.json}
codex:
    agent:
        description: OpenAI Codex CLI — coding agent.
        command: [codex, exec, "${PROMPT}"]
        version_command: [codex, --version]
        credential:
            - {src: ~/.config/codex/auth.json, dst: ~/.config/codex/auth.json, optional: true}
gemini:
    agent:
        description: Google Gemini CLI.
        command: [gemini, chat, "${PROMPT}"]
        version_command: [gemini, --version]
        credential:
            - {src: ~/.config/gcloud/application_default_credentials.json, dst: ~/.config/gcloud/application_default_credentials.json, optional: true}
# =============================================================================
# kind: check — disposable, zero-operator-side-effect R10 test beds.
# =============================================================================
# Each entry is a disposable deployment (a BundleNode), folded into the
# Bundle map at load time so every deploy verb resolves it by name. Run the
# full R10 acceptance sequence on any of them — build → check box → deploy →
# check live → fresh update (R10 gate) → tear down — with:
#
#     charly check run <bed>          # one bed
#     charly check run --all-beds     # every bed, name-sorted
#
# `disposable: true` is the SOLE authorization for that unattended destroy +
# rebuild (see /charly-internals:disposable). Naming: check-<descriptor>-<kind>,
# dropping a redundant suffix when descriptor == kind AND the short form is
# free (check-local, check-pod). The harness AI-sandbox pod is named
# `check-sandbox` (the score `pod:` target), kept disjoint from these beds.
#
# Bed-to-verb coverage map:
#   check-k3s-vm               (vm)  — k8s (all 13 methods) + guest-side
#                                     file/service/port/process, http via
#                                     port-forward, the external vm deploy end-to-end
#   check-k8s-deploy           (vm)  — the EXTERNALIZED deploy:k8s substrate (F1):
#                                     a k3s VM cluster + a target:k8s workload
#                                     member (check-k8s-deploy-app) applied via the
#                                     out-of-process plugin's kubectl apply -k
#   check-pod                  (pod) — combined: kind:image build + kind:layer
#                                     composition order + kind:pod runtime
#                                     (nc :18794 + supervisord) + every
#                                     DeployTarget rendering path
#   check-local                (local) — kind:local layer apply via ShellExecutor
#   check-jupyter-pod          (pod) — jupyter-mcp regression coverage
#   check-jupyter-ml-pod       (pod) — jupyter-ml spacy/quarto + GPU MCP probes
#   check-versa-pod            (pod) — versa OSM analytics + vector-tile + marimo MCP
#   check-android-emulator-pod (pod) — Android 16 emulator (/dev/kvm) + adb/appium
#   check-openclaw-pod         (pod) — minimal openclaw gateway on the cachyos base
#   check-openclaw-full-pod    (pod) — maximal openclaw-full on cachyos (AUR chrome,
#                                     gogcli@latest, ffmpeg/sqlite arch coverage)
#   check-openclaw-desktop-pod (pod) — all-in-one: selkies desktop + openclaw-full
#                                     (claude-code/codex/gemini) + CPU ollama +
#                                     nested charly toolchain (charly+container-nesting)
#
# Zero-operator-side-effect: pod beds → rootless podman; check-k3s-vm → libvirt
# qcow2; check-local → a disposable scratch dir. No test writes to ~/.local/bin,
# ~/.config/opencharly, /etc, /usr, or any operator-side directory.
# =============================================================================
# check-k3s-vm — disposable libvirt VM running k3s-server. Kubeconfig is
# pulled back for host-side k8s: probes (all 13 methods) via the forwarded
# :6443. A VM (native kernel + cgroup tree) sidesteps the rootless-podman
# cpuset-delegation blocker that makes a pod-hosted k3s impossible.
# References the vm: entity `k3s-vm` (defined below).
check-k3s-vm:
    vm:
        from: k3s-vm
        disposable: true
        lifecycle: dev
        description: >-
            Sole deterministic proof of the external-vm-deploy->k8s end-to-end path and the full 13-method k8s probe surface against a real k3s control plane, and the R10 for ssh.port_auto. A disposable libvirt Arch cloud VM (host 16443->guest 6443 forward, charly installed post-boot via the vm substrate (EnsureCharlyInGuest)) overlays k3s-server over SSH, then runs guest command/process/port/file probes plus the full k8s suite (nodes/wait-nodes/pods/wait-ready/addons/ingressclass/storageclass/raw/service) against cluster vm-k3s-vm, an agent-check matching probe, and a host-side charly status --json (status-shows-vm).
        add_candy:
            - k3s-server
        env:
            K3S_SERVER_HOSTNAME: 127.0.0.1
            # Host port 16443 forwards into the guest's :6443; the retrieved
            # kubeconfig's server: line is rewritten to this URL.
            K3S_KUBECONFIG_SERVER: https://127.0.0.1:16443
        install_opts:
            with_service: true
            allow_repo_changes: true # pacman sync / repo key import
            skip_incompatible: true # skip rpm:/deb:-only layer sections
            verify: true
        plan:
            - check: command=id
              id: kv-guest-identity
              stdout: {contains: "uid=1000(arch)"}
              context: [runtime]
              command: id
            - check: command=cat /etc/os-release
              id: kv-guest-os-release
              stdout: {contains: "ID=arch"}
              context: [runtime]
              command: "cat /etc/os-release"
            - check: process=k3s-server
              id: kv-k3s-process
              context: [runtime]
              process:
                process: "k3s-server"
                running: true
            - check: port=6443
              id: kv-port-6443-listening
              context: [runtime]
              port:
                port: 6443
                listening: true
            - check: file=/etc/rancher/k3s/k3s.yaml
              id: kv-kubeconfig-file
              context: [runtime]
              file:
                file: /etc/rancher/k3s/k3s.yaml
                exists: true
            - check: k8s=nodes
              id: kv-k8s-nodes
              kube:
                method: nodes
                cluster: "vm-k3s-vm"
              context: [runtime]
            - check: k8s=wait-nodes
              id: kv-k8s-wait-nodes
              kube:
                method: "wait-nodes"
                cluster: "vm-k3s-vm"
                kube_count: 1
              timeout: "300s"
              context: [runtime]
            - check: k8s=pods
              id: kv-k8s-pods
              kube:
                method: pods
                cluster: "vm-k3s-vm"
                namespace: kube-system
              context: [runtime]
            - check: k8s=wait-ready
              id: kv-k8s-wait-ready
              kube:
                method: "wait-ready"
                cluster: "vm-k3s-vm"
                kube_kind: Deployment
                namespace: kube-system
                name: coredns
              timeout: "180s"
              context: [runtime]
            - check: k8s=addons
              id: kv-k8s-addons
              kube:
                method: addons
                cluster: "vm-k3s-vm"
              context: [runtime]
            - check: k8s=ingressclass
              id: kv-k8s-ingressclass-traefik
              kube:
                method: ingressclass
                cluster: "vm-k3s-vm"
              stdout: {contains: "traefik"}
              context: [runtime]
            - check: k8s=storageclass
              id: kv-k8s-storageclass-localpath
              kube:
                method: storageclass
                cluster: "vm-k3s-vm"
              stdout: {contains: "local-path"}
              context: [runtime]
            - check: k8s=raw — the raw escape hatch lists an arbitrary resource (namespaces)
              id: kv-k8s-raw
              kube:
                method: raw
                cluster: "vm-k3s-vm"
                kube_resource: namespaces
              context: [runtime]
              stdout:
                - contains: kube-system
            - check: k8s=service
              id: kv-k8s-service-kubernetes
              kube:
                method: service
                cluster: "vm-k3s-vm"
                namespace: default
                name: kubernetes
              context: [runtime]
            - check: command=/tmp/charly-build/charly version || charly version
              id: kv-charly-version
              stdout: {matches: "[0-9]{4}\\.[0-9]+"}
              context: [runtime]
              command:
                command: "/tmp/charly-build/charly version || charly version"
                in_container: false
            - agent-check: agent-check
              id: kv-matching
              context: [runtime]
            - check: command=charly status --json
              id: status-shows-vm
              stdout:
                - contains: '"kind": "vm"'
                - contains: k3s-vm
              context:
                - runtime
              command:
                command: charly status --json
                in_container: false
# check-k8s-deploy-app — the check-k8s-deploy bed's target:k8s WORKLOAD fixture.
# A minimal Fedora base box composed from LOCAL pure-rpm candies (supervisord +
# os-layer; no builder, no @github candy refs), so it builds from the root project —
# where the distro namespace boxes (fedora.web, …) do NOT, because their candies are
# @github refs the root resolver does not materialize. It is a disposable-bed FIXTURE
# (the minimal charly image the deploy:k8s substrate deploys), analogous to the
# kind:local check-*-app templates — not a production box, so it does not breach the
# "main owns no boxes" inversion (which concerns the shipped image catalog).
check-k8s-deploy-app:
    candy:
        version: 2026.180.1000
        base: quay.io/fedora/fedora:43
        description: |-
            Minimal Fedora base box — the check-k8s-deploy bed's target:k8s workload.
            A small charly image whose ai.opencharly labels the deploy:k8s preresolver
            reads to generate the Kustomize tree. Composes supervisord + os-layer
            (local pure-rpm candies, no builder/@github) so it builds from the root
            project. The deployed pod is not asserted Ready (the locally-built image is
            absent from the disposable cluster's containerd); the bed asserts only that
            the Deployment OBJECT landed — exactly the externalized `kubectl apply -k`.
        distro:
            - fedora:43
            - fedora
        candy:
            - supervisord
            - os-layer
# =============================================================================
# check-k8s-deploy — disposable proof of the EXTERNALIZED deploy:k8s SUBSTRATE
# (F1, candy/plugin-kube serving deploy:k8s beside verb:kube). A GROUP bed (the
# proven sibling-member shape — cf. box/fedora check-cross-pod-cdp) with two members
# brought up name-sorted: check-k8s-deploy-cluster (a libvirt k3s VM reusing the
# SAME k3s-vm entity + k3s-server candy check-k3s-vm proves) comes up FIRST and
# merges its kubeconfig to context vm-k3s-vm; check-k8s-deploy-workload (a
# `target: k8s` deploy of check-k8s-deploy-app) comes up SECOND — at bring-up the HOST
# preresolver (k8s_deploy_preresolve.go) reads the box Capabilities + the vm-k3s-vm
# cluster template and GENERATES an egress-validated Kustomize tree, then the
# out-of-process plugin applies it with `kubectl --context vm-k3s-vm apply -k`. The
# kube: checks under the cluster member (host-side probes; run after BOTH members are
# up) assert the workload Deployment OBJECT landed — the externalized apply ran
# end-to-end. (The workload POD is not asserted Ready: the locally-built box image is
# not in the VM's containerd, and image-into-cluster delivery is a separate concern
# the deploy substrate does not own; the Deployment-object proof IS the substrate.)
# =============================================================================
check-k8s-deploy:
    group:
        disposable: true
        lifecycle: dev
        description: >-
            R10 for the EXTERNALIZED deploy:k8s substrate (F1) — `target: k8s` resolves out-of-process to candy/plugin-kube's deploy:k8s provider over the E3b reverse channel, not a compiled-in DeployTarget. A group bed with two name-sorted sibling members: check-k8s-deploy-cluster (a disposable libvirt k3s VM, the shared k3s-vm + k3s-server stack, host 16443->guest 6443) brings up a control plane and merges kubeconfig to context vm-k3s-vm; check-k8s-deploy-workload (a target:k8s deploy of check-k8s-deploy-app) is brought up second — its host preresolver generates an egress-validated Kustomize tree and its out-of-process plugin runs `kubectl --context vm-k3s-vm apply -k`. The kube: checks (wait-nodes + raw deployments GET + pods) prove the Deployment object landed on the cluster — the externalized substrate applied the workload end-to-end. The pod is not asserted Ready (the local box image is absent from the VM's containerd; image-into-cluster delivery is orthogonal to the substrate).
    # MEMBER 1 (name-sorts first) — the k3s control plane. bringUpMembers does vm
    # create + bundle add (k3s-server over SSH); K3sPostProvision merges the
    # kubeconfig to context vm-k3s-vm. The kube: assertion checks live HERE (this
    # member has a real SSH venue; the kube: verb dispatches host-side regardless,
    # and group check-live runs them only after BOTH members are up).
    check-k8s-deploy-cluster:
        vm:
            from: k3s-vm
            add_candy:
                - k3s-server
            env:
                K3S_SERVER_HOSTNAME: 127.0.0.1
                # Host port 16443 forwards into the guest's :6443; the retrieved
                # kubeconfig's server: line is rewritten to this URL (cf. check-k3s-vm).
                K3S_KUBECONFIG_SERVER: https://127.0.0.1:16443
            install_opts:
                with_service: true
                allow_repo_changes: true
                skip_incompatible: true
                verify: true
            plan:
                - check: the k3s control plane reports a Ready node before the workload assertion
                  id: kd-wait-nodes
                  kube:
                    method: wait-nodes
                    cluster: "vm-k3s-vm"
                    kube_count: 1
                  timeout: "300s"
                  stdout: {contains: "Ready"}
                  context: [runtime]
                - check: the externalized deploy:k8s substrate applied the workload Deployment object to the cluster
                  id: kd-deployment-landed
                  kube:
                    method: raw
                    cluster: "vm-k3s-vm"
                    kube_resource: deployments
                    kube_group: apps
                    kube_version: v1
                    namespace: default
                    name: check-k8s-deploy-workload
                  stdout: {contains: "check-k8s-deploy-workload"}
                  context: [runtime]
                - check: the applied Deployment's controller scheduled the workload pod onto the cluster
                  id: kd-pod-scheduled
                  kube:
                    method: pods
                    cluster: "vm-k3s-vm"
                    namespace: default
                  stdout: {contains: "check-k8s-deploy-workload"}
                  context: [runtime]
    # MEMBER 2 (name-sorts second) — the target:k8s workload. check-k8s-deploy-app is built
    # locally by the group bed's member-build arm (box build check-k8s-deploy-app), so the host
    # preresolver's ExtractMetadata reads its OCI labels. `from: vm-k3s-vm` selects
    # the kind:k8s cluster template (kubeconfig_context: vm-k3s-vm). Deploy-only (no
    # own checks — it is an instrument; the cluster member's kube: checks assert it).
    check-k8s-deploy-workload:
        k8s:
            image: check-k8s-deploy-app
            from: vm-k3s-vm
# =============================================================================
# check-sidecar-pod — disposable R10 for the sidecar de-type (Cutover D). The
# sidecar KIND's business logic (embedded<project<deploy template MERGE, CLI
# env-flag ROUTING, and volume/secret-name + env_from RESOLUTION) moved out of the
# kernel into candy/plugin-sidecar's OpResolve leg; the kernel stores sidecar defs
# OPAQUELY (map[string]json.RawMessage). This bed deploys the minimal fedora
# check-k8s-deploy-app pod with the project `mypause` sidecar attached: `charly
# config` resolves the sidecar THROUGH the plugin (providerRegistry.ResolveKind →
# Invoke(OpResolve)) and generates the sidecar quadlet. If the de-type broke
# resolution, config errors and the bed never reaches steady state; the pause
# sidecar (a tiny always-running infra image) proves the resolved quadlet deployed
# as a live pod member beside the app.
# =============================================================================
mypause:
    sidecar:
        description: a trivial always-running sidecar for the sidecar de-type R10 bed
        image: registry.k8s.io/pause:3.9
check-sidecar-pod:
    pod:
        image: check-k8s-deploy-app
        disposable: true
        lifecycle: dev
        description: >-
            R10 for the sidecar de-type (Cutover D) — candy/plugin-sidecar's OpResolve
            owns all sidecar business logic; the kernel stores sidecar defs opaquely.
            Deploys the minimal check-k8s-deploy-app pod with the `mypause` sidecar
            attached: reaching steady state proves the plugin resolved + generated the
            sidecar quadlet end-to-end (a broken de-type fails `charly config` at deploy).
        sidecar:
            mypause: {}
        plan:
            - check: command=charly status --json
              id: sidecar-pod-running
              stdout:
                - contains: '"kind": "pod"'
                - contains: check-sidecar-pod
              context:
                - runtime
              command:
                command: charly status --json

defaults:
    base: quay.io/fedora/fedora:43
    platform:
        - linux/amd64
        - linux/arm64
    tag: auto
    registry: ghcr.io/test
    build:
        - rpm
base:
    candy:
        base: quay.io/fedora/fedora:43
        candy:
            - pixi
bazzite:
    candy:
        base: ghcr.io/ublue-os/bazzite:stable
        bootc: true
        platform:
            - linux/amd64
        candy:
            - custom-packages
cuda:
    candy:
        base: quay.io/fedora/fedora:43
        platform:
            - linux/amd64
        candy:
            - pixi
            - cuda
disabled-image:
    candy:
        base: quay.io/fedora/fedora:43
        enabled: false
        candy:
            - nonexistent-layer
inference:
    candy:
        base: ml-cuda
        tag: nightly
        candy:
            - supervisord
            - ollama
ml-cuda:
    candy:
        base: cuda
        candy:
            - python
            - ml-libs
ubuntu-dev:
    candy:
        base: ubuntu:24.04
        build:
            - deb
        candy:
            - pixi
            - nodejs

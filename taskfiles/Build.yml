version: '3'

tasks:
  # `binary` is the ONE dev build task — per-worktree, NEVER a host install. There is
  # no `charly` / `install` / `install-arch` task any more: system-wide installs are
  # not part of the development workflow (see #55's motivating incident — a host-wide
  # pacman rebuild while OTHER worktrees/teammates were mid-verification broke the
  # per-worktree-binary invariant). Development ALWAYS uses THIS worktree's own
  # ./bin/charly; a native package (`pkg:*` below, or `install-portable`) is an
  # explicit, separate action, never a side effect of building.
  binary:
    desc: Build the charly binary to bin/charly (CalVer-stamped; NO host install)
    dir: "{{.ROOT_DIR}}"
    cmds:
      - mkdir -p bin candy/charly/bin
      # Regenerate the compiled-in plugin wiring from charly.yml `compiled_plugins:`
      # BEFORE the go build that needs it: pluginsgen emits charly/plugins_generated.go
      # (registerCompiledPlugin per selected plugin candy) + the repo-root go.work (the
      # `use` directives that let `go build ./charly` resolve those candy imports).
      # GOWORK=off so a stale go.work can't fail workspace load before regeneration;
      # the generator imports only stdlib+yaml and runs without a pre-built charly.
      - cd charly && GOWORK=off go run ./internal/pluginsgen -root .. -config charly/charly.yml -out charly/plugins_generated.go -gowork go.work
      # Stamp the binary's CalVer identity (`charly version` → main.BuildCalVer) at
      # build time, from the shared pkg/arch/calver.sh — ALWAYS the HEAD commit's
      # UTC date (deterministic: same commit → same version, whether the tree is
      # clean or dirty; the build clock is never consulted). Without this stamp
      # `charly version` would read the wall clock at invocation — useless as a build
      # identity / freshness signal. The copy into candy/charly/bin/charly carries the
      # same stamp, so the `charly` layer (and every image/VM baking it) ships a
      # self-identifying binary, and the PKGBUILD's pkgver() reads this same
      # binary's `charly version` so the pacman package can never disagree.
      - |
        CALVER=$(bash pkg/arch/calver.sh)
        cd charly && go build -ldflags "-X main.BuildCalVer=${CALVER}" -o ../bin/charly .
      - cp bin/charly candy/charly/bin/charly

  # Solo/bootstrap use only — never run this on a host with in-flight multi-teammate
  # work: it WRITES to $HOME, and if $HOME/.local/bin precedes a native-package
  # install location (e.g. /usr/bin) in $PATH, it SHADOWS the system `charly` for
  # this user, silently changing which binary any bare-`$PATH` invocation (a
  # `local: {host: local}` deploy step, another session, a script) resolves to.
  install-portable:
    desc: 'Force portable install to $HOME/.local/bin/charly (solo/bootstrap use only — can shadow the system charly if $HOME/.local/bin precedes /usr/bin in $PATH)'
    dir: "{{.ROOT_DIR}}"
    deps: [binary]
    cmds:
      - install -D -m 0755 bin/charly "$HOME/.local/bin/charly"
      - echo "Installed to $HOME/.local/bin/charly"

  # Release-artifact builds — thin wrappers over `charly box pkg`, which builds each
  # native package via the SAME embedded local_pkg.build_template the deploy-time
  # localpkg path uses (R3): `pac` runs makepkg DIRECTLY on the host (needs an
  # Arch-family host); `rpm`/`deb` run rpmbuild/dpkg-buildpackage distro-natively in
  # rootless podman (fedora:43 / debian:13 build containers) on any host with podman.
  # Output → dist/.
  pkg:arch:
    desc: Build the charly .pkg.tar.zst release artifact into dist/
    dir: "{{.ROOT_DIR}}"
    deps: [binary]
    cmds:
      - bin/charly box pkg pac

  pkg:fedora:
    desc: Build the charly .rpm release artifact into dist/
    dir: "{{.ROOT_DIR}}"
    deps: [binary]
    cmds:
      - bin/charly box pkg rpm

  pkg:debian:
    desc: Build the charly .deb release artifact into dist/ (serves Debian + Ubuntu)
    dir: "{{.ROOT_DIR}}"
    deps: [binary]
    cmds:
      - bin/charly box pkg deb

  pkg:all:
    desc: Build every native package release artifact (.pkg.tar.zst/.rpm/.deb) into dist/
    dir: "{{.ROOT_DIR}}"
    deps: [binary]
    cmds:
      - bin/charly box pkg

  # Package test matrix (install targets = every distro version FULLY supported by
  # the upstream maintainers; verified 2026-07 against endoflife.date):
  #
  #   artifact        cells (base images)
  #   .pkg.tar.zst    archlinux:latest, cachyos-v3 (this repo's own pin)
  #   .deb            debian:13, ubuntu:24.04, ubuntu:26.04
  #   .rpm            fedora:43, fedora:44
  #
  # `pkg:test` runs scripts/pkg-install-test.sh — the SINGLE canonical definition
  # (R3): the release-packages workflow calls the SAME script per format; never a
  # second inline copy. Each cell natively installs the artifact in a throwaway
  # rootless-podman container and asserts dep auto-resolution, `charly version`
  # equals the build CalVer, and welded-plugin project-less dispatch.
  #
  # Version-bump runbook (when a distro revs, e.g. fedora 44→45):
  #   1. Check upstream support FIRST (endoflife.date): drop cells whose version
  #      left full support (debian 12 hit its security-support cliff 2026-07-11;
  #      fedora 43 goes EOL 2026-12-09 — its cell drops then).
  #   2. Add the new cell to scripts/pkg-install-test.sh (matrix lives ONLY there).
  #   3. Check dep-name drift against the new release's repos: run the new cell —
  #      a resolve failure lands the fix in the owning pkg/<fmt> repo (deb
  #      Depends: alternatives / rpm `%if 0%{?fedora}` guards), never here.
  #   4. The one-venue-per-format BUILD container (debian:13 / fedora:43 in the
  #      embedded local_pkg.build_template) is deliberate — the artifact serves the
  #      whole format family. A second build version needs an explicit
  #      `build_image:` field on local_pkg, not a template edit.
  #   5. Box-substrate support (new base entities, distro.<name>.version, VM beds)
  #      is a SEPARATE cutover in the box/<distro> submodules, not this matrix.
  pkg:test:
    desc: Install-test the dist/ packages on every supported distro version (7 container cells)
    dir: "{{.ROOT_DIR}}"
    deps: [pkg:all]
    cmds:
      - scripts/pkg-install-test.sh dist/ "$(bash pkg/arch/calver.sh)"
